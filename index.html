  skyTint:    "#ECEEF8",
  white:      "#FFFFFF",
  offWhite:   "#F6F7FC",
  slate:      "#5A6080",
  slateLight: "#9096B8",
  border:     "#D8DAF0",
  green:      "#2E7D52",
  greenBg:    "#EAF4EE",
  amber:      "#B45309",

/* --- Global CSS -------------------------------------------------------------- */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { -webkit-text-size-adjust: 100%; }
body { font-family: 'DM Sans', sans-serif; background: ${T.offWhite}; color: ${T.navy}; }

img, .file-zoomable { touch-action: auto; }

.app {
  display: flex; flex-direction: column;
  min-height: 100vh; max-width: 430px; margin: 0 auto;
  background: ${T.white}; position: relative;
  box-shadow: 0 0 60px rgba(27,43,75,.12);
}

.hdr {
  background: ${T.navy};
  padding: 14px 18px 12px;
  position: sticky; top: 0; z-index: 300;
  border-bottom: 2px solid rgba(255,255,255,.08);
}
.hdr-inner { display: flex; align-items: center; justify-content: space-between; }
.brand-wrap { display: flex; align-items: center; gap: 11px; }
.brand-logo { width: 42px; height: 42px; flex-shrink: 0; }
.brand-name {
  font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700;
  color: ${T.white}; letter-spacing: 2.5px; text-transform: uppercase; line-height: 1.1;
}
.brand-sub  { font-size: 9px; font-weight: 400; letter-spacing: 2.5px; text-transform: uppercase; color: ${T.slateLight}; margin-top: 3px; }
.hdr-date   { font-size: 11px; color: ${T.slateLight}; text-align: right; line-height: 1.5; }

.tabbar {
  background: ${T.white}; border-bottom: 1px solid ${T.border};
  display: flex; overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 69px; z-index: 299;
}
.tabbar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto; padding: 11px 17px;
  border: none; background: transparent;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: ${T.slateLight}; cursor: pointer; white-space: nowrap;
  border-bottom: 2.5px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab-btn.on { color: ${T.navy}; border-bottom-color: ${T.blue}; font-weight: 600; }
.tab-btn:hover:not(.on) { color: ${T.slate}; }

.content { flex: 1; padding: 20px 16px 100px; }

.sec-hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
.sec-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 600; color: ${T.navy}; letter-spacing: .5px; }
.sec-count { font-size: 12px; font-weight: 500; color: ${T.slateLight}; }

.card {
  border: 1px solid ${T.border}; border-radius: 12px;
  padding: 15px 16px; margin-bottom: 12px;
  background: ${T.white}; cursor: pointer;
  transition: box-shadow .18s, border-color .18s;
}
.card:hover { box-shadow: 0 4px 18px rgba(27,43,75,.09); border-color: #BDC9E0; }
.card.ther-card { border-left: 3px solid ${T.teal}; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.card-name { font-size: 15px; font-weight: 600; color: ${T.navy}; line-height: 1.2; }
.card-sub  { font-size: 12px; color: ${T.slate}; margin-top: 3px; }

.row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
.row-label { color: ${T.slateLight}; }
.row-value { font-weight: 500; color: ${T.navy}; text-align: right; }

.div { height: 1px; background: ${T.border}; margin: 12px 0; }

.badge {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge-green { background: ${T.greenBg}; color: ${T.green}; }
.badge-red   { background: ${T.redBg};   color: ${T.red}; }
.badge-amber { background: ${T.amberBg}; color: ${T.amber}; }
.badge-blue  { background: ${T.skyTint}; color: ${T.blue}; }
.badge-teal  { background: ${T.tealBg};  color: ${T.teal}; }
.badge-slate { background: #F1F5F9;      color: ${T.slate}; }

.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.stat-box  { background: ${T.offWhite}; border: 1px solid ${T.border}; border-radius: 10px; padding: 14px 10px; text-align: center; }
.stat-num  { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 600; color: ${T.blue}; line-height: 1; }
.stat-lbl  { font-size: 10px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: ${T.slateLight}; margin-top: 4px; }

.alert { border-radius: 8px; padding: 11px 13px; font-size: 13px; margin-bottom: 12px; border-left: 3px solid; }
.alert-green { background: ${T.greenBg}; border-color: ${T.green}; color: ${T.green}; }
.alert-amber { background: ${T.amberBg}; border-color: ${T.amber}; color: ${T.amber}; }
.alert-blue  { background: ${T.skyTint}; border-color: ${T.blue};  color: ${T.blue}; }
.alert-teal  { background: ${T.tealBg};  border-color: ${T.teal};  color: ${T.teal}; }

.wb-wrap  { margin-top: 8px; }
.wb-meta  { display: flex; justify-content: space-between; font-size: 11px; color: ${T.slateLight}; margin-bottom: 4px; }
.wb-track { height: 6px; border-radius: 3px; background: ${T.border}; overflow: hidden; }
.wb-fill  { height: 100%; border-radius: 3px; transition: width .35s ease; }
.wb-low   { background: ${T.green}; }
.wb-med   { background: ${T.amber}; }
.wb-high  { background: ${T.red}; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px; border-radius: 8px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .18s;
}
.btn-primary { background: ${T.navy}; color: ${T.white}; }
.btn-primary:hover { background: ${T.navyMid}; }
.btn-outline  { background: transparent; color: ${T.navy}; border: 1.5px solid ${T.border}; }
.btn-outline:hover { background: ${T.offWhite}; }
.btn-block { width: 100%; }

.search-wrap { position: relative; margin-bottom: 14px; }
.search-ico  { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: ${T.slateLight}; pointer-events: none; }
.search-inp  {

}
.search-inp:focus { outline: none; border-color: ${T.blue}; background: ${T.white}; }

.chips { display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
.chip {

  cursor: pointer; border: 1.5px solid ${T.border};
  background: transparent; color: ${T.slate}; transition: all .15s;
  font-family: 'DM Sans', sans-serif;
}
.chip.on { background: ${T.navy}; color: ${T.white}; border-color: ${T.navy}; }

.fab {
  position: fixed; bottom: 28px;

  width: 52px; height: 52px; border-radius: 50%;
  background: ${T.blue}; color: ${T.white};
  border: none; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(61,107,158,.4);
  display: flex; align-items: center; justify-content: center;
  transition: all .18s; z-index: 400;
}
.fab:hover { background: ${T.navy}; transform: scale(1.06); }

.overlay {
  position: fixed; inset: 0;
  background: rgba(10,18,35,.45);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 1000;
  animation: ov-in .2s;
}

  background: ${T.white}; border-radius: 18px 18px 0 0;

  max-height: 88vh; overflow-y: auto;
  padding: 24px 20px 40px;

}
.sheet-title { font-family: 'Cinzel', serif; font-size: 19px; font-weight: 600; color: ${T.navy}; margin-bottom: 18px; letter-spacing: .3px; }
@keyframes ov-in { from { opacity:0 } to { opacity:1 } }
@keyframes sh-in { from { transform:translateY(50px); opacity:0 } to { transform:translateY(0); opacity:1 } }

.fg { margin-bottom: 13px; }
.fl { display: block; font-size: 11px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: ${T.slate}; margin-bottom: 5px; }
.fc {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid ${T.border}; background: ${T.offWhite};
  font-family: 'DM Sans', sans-serif; font-size: 16px; color: ${T.navy};
  transition: border-color .15s;
}
.fc:focus { outline: none; border-color: ${T.blue}; background: ${T.white}; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.bill-hero {

.bill-hero-label  { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: ${T.slateLight}; margin-bottom: 4px; }

.sub-head { font-weight: 600; color: ${T.slate}; font-size: 12px; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 8px; }

.empty { text-align: center; padding: 44px 20px; color: ${T.slateLight}; }
.empty-ico { font-size: 38px; margin-bottom: 10px; }
.empty-txt { font-size: 14px; }

/* -- Calendar view toggle -- */
.view-toggle {
  display: flex; background: ${T.offWhite}; border: 1px solid ${T.border};
  border-radius: 8px; padding: 3px; margin-bottom: 14px; gap: 2px;
}
.view-btn {
  flex: 1; padding: 7px 10px; border: none; border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;

  transition: all .15s;
}
.view-btn.on { background: ${T.white}; color: ${T.navy}; box-shadow: 0 1px 4px rgba(27,43,75,.1); }

/* -- Calendar nav -- */
.cal-nav {

  margin-bottom: 14px;

.cal-nav-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; color: ${T.navy}; }

/* -- Daily view -- */
.day-header {

.time-label {

.lb-name  { font-size: 13px; font-weight: 600; color: ${T.navy}; }
.lb-sub   { font-size: 11px; color: ${T.slate}; margin-top: 2px; }

/* -- Weekly view -- */

  display: grid; grid-template-columns: 44px repeat(7,1fr);
  border: 1px solid ${T.border}; border-radius: 10px; overflow: hidden;
  margin-bottom: 14px;
}
.wg-head { background: ${T.offWhite}; }
.wg-head-cell {
  padding: 8px 3px; text-align: center; font-size: 10px; font-weight: 600;
  color: ${T.slateLight}; letter-spacing: .5px; text-transform: uppercase;
  border-bottom: 1px solid ${T.border};
}
.wg-head-cell.today-col { color: ${T.blue}; background: ${T.skyTint}; }
.wg-day-num {
  font-size: 14px; font-weight: 700; color: ${T.navy};
  display: block; margin-top: 2px;
}
.wg-day-num.today-num {
  background: ${T.blue}; color: ${T.white};
  border-radius: 50%; width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.wg-corner { border-bottom: 1px solid ${T.border}; }
.wg-body-cell {
  border-left: 1px solid ${T.border}; padding: 4px 3px;
  min-height: 60px; vertical-align: top;
}
.wg-body-cell.today-col { background: rgba(61,107,158,.03); }
.wg-time-cell {
  padding: 4px 6px 4px 0; font-size: 10px; color: ${T.slateLight};
  text-align: right; border-top: 1px solid ${T.border};
  font-weight: 500;
}
.wg-lesson-pill {
  display: block; border-radius: 4px; padding: 3px 5px;
  font-size: 10px; font-weight: 600; margin-bottom: 2px;
  cursor: pointer; line-height: 1.3; border-left: 2px solid transparent;
  transition: opacity .15s;
}
.wg-lesson-pill:hover { opacity: .8; }
.wg-pill-eng  { background: ${T.skyTint}; color: ${T.blue};  border-left-color: ${T.blue}; }
.wg-pill-ther { background: ${T.tealBg};  color: ${T.teal};  border-left-color: ${T.teal}; }
.wg-pill-done { background: ${T.greenBg}; color: ${T.green}; border-left-color: ${T.green}; }
.wg-pill-canc { background: ${T.redBg};   color: ${T.red};   border-left-color: ${T.red}; opacity:.6; }
`;

/* --- Helpers ----------------------------------------------------------------- */
const TODAY = new Date().toISOString().split("T")[0];
const fmt  = n => `₪${Number(n).toLocaleString("en-IL",{maximumFractionDigits:0})}`;
const fmtD = d => new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const cap  = s => s.charAt(0).toUpperCase()+s.slice(1);
// Get the fee for a specific contact from an event (handles per-contact pricing)
const contactFee = (ev, contactId) => {
  if(ev.contactPrices&&ev.contactPrices[contactId]!==undefined) return +ev.contactPrices[contactId];
  if(ev.contactIds?.length>1 && ev.contactPrices && Object.keys(ev.contactPrices).length>0) return 0;
  return ev.price||0;
};
const wlLvl = h => { const p=h.weeklyLessons/h.maxWeekly; return p>=.85?"high":p>=.6?"med":"low"; };

function FileBox({attachments=[], onAdd, onRemove, label="Attachments"}) {
  const uid = React.useMemo(()=>"fb-"+Math.random().toString(36).slice(2),[]);
  const handleFiles = (e) => {
    const files = Array.from(e.target.files||[]);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        onAdd({ id:Date.now()+Math.random(), name:file.name, type:file.type, size:file.size, data:ev.target.result, addedAt:new Date().toISOString() });
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };
  const fmtSize = (b) => b>1048576?(b/1048576).toFixed(1)+"MB":b>1024?(b/1024).toFixed(0)+"KB":b+"B";
  const icon = (type) => type?.startsWith("image/")?"🖼️":type==="application/pdf"?"📄":type?.startsWith("video/")?"🎬":"📎";
  return (
    <div style={{marginTop:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <label className="fl" style={{margin:0}}>{label}{attachments.length>0&&<span style={{background:T.blue,color:"#fff",borderRadius:10,padding:"0 7px",fontSize:10,marginLeft:6}}>{attachments.length}</span>}</label>
        <label htmlFor={uid} className="btn btn-outline" style={{fontSize:11,padding:"4px 12px",cursor:"pointer",margin:0}}>+ Add File</label>
      </div>
      <input id={uid} type="file" multiple accept="image/*,.pdf,.doc,.docx,.xlsx,.txt,.mp4,.mov" style={{display:"none"}} onChange={handleFiles}/>
      {attachments.length===0 ? (
        <label htmlFor={uid} style={{display:"block",border:`1.5px dashed ${T.border}`,borderRadius:10,padding:"18px 12px",textAlign:"center",cursor:"pointer",color:T.slateLight,fontSize:13,background:T.offWhite}}>
          Tap to upload photos, PDFs, documents…
        </label>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {attachments.map(att=>(
            <div key={att.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:T.white}}>
              <span style={{fontSize:20}}>{icon(att.type)}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:T.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{att.name}</div>
                <div style={{fontSize:10,color:T.slateLight}}>{fmtSize(att.size)}</div>
              </div>
              {att.type?.startsWith("image/")
                ? <a href={att.data} target="_blank" rel="noopener noreferrer"><img src={att.data} alt={att.name} style={{width:36,height:36,borderRadius:6,objectFit:"cover"}}/></a>
                : <a href={att.data} download={att.name} style={{textDecoration:"none"}}><button className="btn btn-outline" style={{fontSize:10,padding:"3px 8px"}}>↓</button></a>
              }
              <button onClick={()=>onRemove(att.id)} style={{background:"none",border:"none",color:T.red,fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
            </div>
          ))}
          <label htmlFor={uid} className="btn btn-outline" style={{fontSize:11,marginTop:2,textAlign:"center",cursor:"pointer",display:"block",padding:"8px"}}>+ Add More</label>
        </div>
      )}
    </div>
  );
}

function AchievementAdder({contactId, upd, data}) {
  const [aText, setAText] = React.useState("");
  return (
    <div style={{display:"flex",gap:8}}>
      <input className="fc" style={{flex:1,fontSize:12}} placeholder="e.g. 1st Place, Spring Classic" value={aText} onChange={e=>setAText(e.target.value)}/>
      <button className="btn btn-primary" style={{padding:"8px 14px",fontSize:12}} onClick={()=>{
        if(!aText.trim()) return;
        upd("contacts",(data.contacts||[]).map(c=>c.id===contactId?{...c,accomplishments:[...(c.accomplishments||[]),aText.trim()]}:c));
        setAText("");
      }}>Add</button>
    </div>
  );
}

  const myPays = (data.payments||[]).filter(x=>x.contactId===live.id).sort((a,b)=>b.date.localeCompare(a.date));

  // ── Actual balance: only COMPLETED sessions + all comp/clinic fees ──

  const actualBilled   = completedEvts.reduce((s,e)=>s+contactFee(e,live.id),0) + compFees + clinicFees;
  const totalPaid      = myPays.reduce((s,x)=>s+x.amount,0);
  const actualBalance  = actualBilled - totalPaid;   // positive = owed, negative = credit

  // ── Planned: scheduled (future) sessions this month ──

  const savePay  = ()=>{ if(!pf.amount)return; upd("payments",[...(data.payments||[]),{id:Date.now(),contactId:live.id,...pf,amount:+pf.amount,reconciled:false}]); setPf({amount:"",date:TODAY,method:"Bank transfer",note:""}); setShowPay(false); };
  const saveEdit = ()=>{ upd("contacts",(data.contacts||[]).map(c=>c.id===live.id?{...c,...ef}:c)); setSec("overview"); };

    <>

      <div className="chips" style={{marginBottom:14}}>
        {[["overview","Overview"],["schedule",`Schedule (${evts.length})`],["payments","Payments"],["incidents","Incidents"],["edit","Edit"]].map(([v,l])=>(

        ))}
      </div>

      {sec==="overview"&&(<>
        {age&&<div className="row"><span className="row-label">Age</span><span className="row-value">{age} yrs {live.dob?`· DOB ${fmtD(live.dob)}`:""}</span></div>}

            </select>
          </div>

          <button className="btn btn-primary btn-block" onClick={savePay}>Save Payment</button>
        </div>}
        {myPays.length===0&&!showPay&&<div className="empty"><div className="empty-ico">💳</div><div className="empty-txt">No payments recorded.</div></div>}
        {myPays.map(x=><div key={x.id} className="card" style={{cursor:"default"}}><div className="card-top" style={{marginBottom:4}}><div><div className="card-name" style={{fontSize:14}}>{fmt(x.amount)}</div><div className="card-sub">{fmtD(x.date)} · {x.method}</div></div><span className={`badge badge-${x.reconciled?"green":"slate"}`}>{x.reconciled?"Reconciled":"Pending"}</span></div>{x.note&&<div style={{fontSize:12,color:T.slate}}>{x.note}</div>}</div>)}

        {/* Session breakdown */}
        {completedEvts.length>0&&(()=>{
          // Sort oldest first — FIFO: oldest sessions are paid first
          const sessionsSorted = [...completedEvts].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
          let remaining = totalPaid;
          const rows = sessionsSorted.map(e=>{
            const fee = contactFee(e, live.id);
            if(fee===0) return {...e, isPaid:true, unpaid:0};
            if(remaining>=fee){ remaining-=fee; return {...e, isPaid:true, unpaid:0}; }
            const partPaid=remaining; remaining=0;
            return {...e, isPaid:partPaid>=fee, unpaid:fee-partPaid};
          });
          const unpaidSessions = rows.filter(r=>!r.isPaid).reverse(); // most recent first
          const paidSessions   = rows.filter(r=>r.isPaid).reverse();
          return (<>
            <div className="div"/>
            <div className="sub-head">Session Breakdown</div>
            {unpaidSessions.length===0&&paidSessions.length===0&&(
              <div style={{fontSize:12,color:T.slateLight,fontStyle:"italic"}}>No completed sessions to display.</div>
            )}
            {unpaidSessions.length>0&&(<>
              <div style={{fontSize:12,color:T.red,fontWeight:600,marginBottom:6}}>⚠ Unpaid Sessions ({unpaidSessions.length})</div>
              {unpaidSessions.map(e=>{
                const horses=(e.horseIds||[]).map(id=>data.horses?.find(h=>h.id===id)?.name).filter(Boolean).join(", ");
                return (
                  <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,border:`1px solid ${T.red}44`,background:"#FFF5F5",marginBottom:6,cursor:"pointer"}} onClick={()=>setModal({type:"scheduleDetail",payload:e})}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{fmtD(e.date)} · {e.time}</div>
                      <div style={{fontSize:11,color:T.slateLight}}>{e.eventType}{horses?` · ${horses}`:""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:T.red,fontWeight:700}}>{fmt(e.price||0)}</div>
                      <div style={{fontSize:10,color:T.red}}>Unpaid</div>
                    </div>
                  </div>
                );
              })}
            </>)}
            {paidSessions.length>0&&(<>
              <div style={{fontSize:12,color:T.green,fontWeight:600,marginBottom:6,marginTop:unpaidSessions.length>0?12:0}}>✓ Paid Sessions ({paidSessions.length})</div>
              {paidSessions.map(e=>{
                const horses=(e.horseIds||[]).map(id=>data.horses?.find(h=>h.id===id)?.name).filter(Boolean).join(", ");
                return (
                  <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,border:`1px solid ${T.green}44`,background:"#F0FDF4",marginBottom:6,cursor:"pointer"}} onClick={()=>setModal({type:"scheduleDetail",payload:e})}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{fmtD(e.date)} · {e.time}</div>
                      <div style={{fontSize:11,color:T.slateLight}}>{e.eventType}{horses?` · ${horses}`:""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:T.green,fontWeight:700}}>{fmt(e.price||0)}</div>
                      <div style={{fontSize:10,color:T.green}}>Paid</div>
                    </div>
                  </div>
                );
              })}
            </>)}
          </>);
        })()}
      </>)}


      {sec==="incidents"&&<ContactIncidents contactId={live.id} contactName={live.name} data={data} upd={upd} setModal={setModal}/>}

      {sec==="edit"&&(<>
        <div className="fg"><label className="fl">Full Name</label><input className="fc" value={ef.name} onChange={e=>setEf(x=>({...x,name:e.target.value}))}/></div>
        <div className="grid2">
          <div className="fg"><label className="fl">Gender</label><select className="fc" value={ef.gender} onChange={e=>setEf(x=>({...x,gender:e.target.value}))}><option>Female</option><option>Male</option><option>Other</option></select></div>
          <div className="fg"><label className="fl">Date of Birth</label><input type="date" className="fc" value={ef.dob} onChange={e=>setEf(x=>({...x,dob:e.target.value}))}/></div>
        </div>
        <div className="grid2">

/* ── IncidentForm: reusable form to file a new incident, pre-filled from context ── */
function IncidentForm({data, upd, onSave, prefill={}}) {
  const [f, setF] = React.useState({
    date: prefill.date||TODAY,
    location: prefill.location||"",
    contactIds: prefill.contactIds||[],
    horseIds: prefill.horseIds||[],
    witnesses: "",
    description: "",
    attachments: [],
  });
  const toggle = (field,id) => setF(x=>({...x,[field]:x[field].includes(id)?x[field].filter(i=>i!==id):[...x[field],id]}));
  const save = () => {
    if(!f.description.trim()) return;
    upd("incidentReports",[...(data.incidentReports||[]),{id:Date.now(),...f}]);
    onSave&&onSave();
  };
  return (
    <div style={{background:T.offWhite,borderRadius:10,padding:14,border:`1px solid ${T.border}`}}>
      <div className="grid2">
        <div className="fg"><label className="fl">Date</label><input type="date" className="fc" value={f.date} onChange={e=>setF(x=>({...x,date:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Location</label><input className="fc" placeholder="Where it happened" value={f.location} onChange={e=>setF(x=>({...x,location:e.target.value}))}/></div>
      </div>
      <div className="fg"><label className="fl">People Involved</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
          {(data.contacts||[]).filter(c=>c.status==="active").map(c=>{
            const on=f.contactIds.includes(c.id);
            return <button key={c.id} className={`chip${on?" on":""}`} style={{fontSize:11}} onClick={()=>toggle("contactIds",c.id)}>{c.name.split(" ")[0]}</button>;
          })}
        </div>
      </div>
      <div className="fg"><label className="fl">Horses Involved</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
          {(data.horses||[]).map(h=>{
            const on=f.horseIds.includes(h.id);
            return <button key={h.id} className={`chip${on?" on":""}`} style={{fontSize:11}} onClick={()=>toggle("horseIds",h.id)}>{h.name}</button>;
          })}
        </div>
      </div>
      <div className="fg"><label className="fl">Witnesses</label><input className="fc" placeholder="Names of witnesses" value={f.witnesses} onChange={e=>setF(x=>({...x,witnesses:e.target.value}))}/></div>
      <div className="fg"><label className="fl">Description *</label><textarea className="fc" rows={4} placeholder="Describe what happened..." value={f.description} onChange={e=>setF(x=>({...x,description:e.target.value}))}/></div>
      <div className="div"/>
      <FileBox attachments={f.attachments} label="Supporting Files"
        onAdd={att=>setF(x=>({...x,attachments:[...x.attachments,att]}))}
        onRemove={id=>setF(x=>({...x,attachments:x.attachments.filter(a=>a.id!==id)}))}
      />
      <div className="div"/>
      <button className="btn btn-primary btn-block" onClick={save} style={{background:T.red,borderColor:T.red}}>
        ⚠ Save Incident Report
      </button>
    </div>
  );
}

function EventDetail({p, data, upd, setModal, close}) {
    const isComp = p.kind==="competition";
    const key    = isComp ? "competitions" : "clinics";
    const feeKey = isComp ? "fee" : "price";

    const live = (isComp ? data.competitions : data.clinics).find(e=>e.id===p.id) || p;
    const enrolled    = (live.contactIds||live.clientIds||[]).map(id=>data.contacts.find(c=>c.id===id)).filter(Boolean);
    const notEnrolled = data.contacts.filter(c=>c.status==="active"&&!live.contactIds?.includes(c.id));
    const spotsLeft   = isComp ? null : (live.spotsTotal||0) - enrolled.length;
    const rChecks     = live.riderChecks||{};
    const hChecks     = live.horseChecks||{};
    const assignedHorseIds = [...new Set(enrolled.map(c=>rChecks[c.id]?.horseId).filter(Boolean))];
    const assignedHorses   = assignedHorseIds.map(hid=>data.horses.find(h=>h.id===hid)).filter(Boolean);

    const patchEvent = (patch) => upd(key,(isComp?data.competitions:data.clinics).map(e=>e.id===live.id?{...e,...patch}:e));
    const addRider    = (clientId) => patchEvent({contactIds:[...(live.contactIds||live.clientIds||[]),clientId],riderChecks:{...rChecks,[clientId]:{paymentSent:false,horseId:null}}});
    const removeRider = (clientId) => { const newIds=(live.contactIds||live.clientIds||[]).filter(id=>id!==clientId); const newChecks={...rChecks}; delete newChecks[clientId]; patchEvent({contactIds:newIds,riderChecks:newChecks}); };
    const setRiderHorse  = (clientId,horseId) => { const cur=rChecks[clientId]||{paymentSent:false,horseId:null}; patchEvent({riderChecks:{...rChecks,[clientId]:{...cur,horseId:horseId?+horseId:null}}}); };
    const togglePayment  = (clientId) => { const cur=rChecks[clientId]||{paymentSent:false,horseId:null}; patchEvent({riderChecks:{...rChecks,[clientId]:{...cur,paymentSent:!cur.paymentSent}}}); };
    const toggleVet      = (horseId)  => { const cur=hChecks[horseId]||{vetApproved:false}; patchEvent({horseChecks:{...hChecks,[horseId]:{...cur,vetApproved:!cur.vetApproved}}}); };
    const toggleTrailer  = () => patchEvent({trailerBooked:!live.trailerBooked});
    const horseRiderCount = (horseId) => enrolled.filter(c=>rChecks[c.id]?.horseId===horseId).length;
    const availableHorses = (currentHorseId) => data.horses.filter(h=>h.id===currentHorseId||horseRiderCount(h.id)<3);
    const riderDone = (clientId) => { const rc=rChecks[clientId]||{}; if(!rc.paymentSent||!rc.horseId) return false; return !!(hChecks[rc.horseId]?.vetApproved); };
    const allDone   = isComp && enrolled.length>0 && live.trailerBooked && enrolled.every(c=>riderDone(c.id));
    const status    = live.status||"scheduled"; // scheduled | completed | cancelled
    const totalFee  = enrolled.length*(live[feeKey]||0);

    const [evSec, setEvSec] = useState("details");
    const [ef, setEf] = useState({
      name:live.name||"", date:live.date||TODAY, endDate:live.endDate||live.date||TODAY, location:live.location||"",
      [feeKey]: String(live[feeKey]||0),
      ...(isComp?{transporterId:live.transporterId||""}:{clinician:live.clinician||"",spotsTotal:String(live.spotsTotal||10),duration:live.duration||""}),
    });

        {evSec==="details"&&(<>
          <div className="row"><span className="row-label">Date</span><span className="row-value">{fmtD(live.date)}{live.endDate&&live.endDate!==live.date?` – ${fmtD(live.endDate)}`:""}</span></div>

          {live.clinician&&<div className="row"><span className="row-label">Clinician</span><span className="row-value">{live.clinician}</span></div>}
          {live.duration&&<div className="row"><span className="row-label">Duration</span><span className="row-value">{live.duration}</span></div>}

          <div className="row"><span className="row-label">Enrolled</span><span className="row-value">{enrolled.length} rider{enrolled.length!==1?"s":""}</span></div>
          <div className="row"><span className="row-label">Total revenue</span><span className="row-value" style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:T.blue}}>{fmt(totalFee)}</span></div>
          {!isComp&&<div className="row"><span className="row-label">Spots</span><span className="row-value" style={{color:spotsLeft===0?T.red:spotsLeft<=2?T.amber:T.green}}>{enrolled.length}/{live.spotsTotal}{spotsLeft===0?" — FULL":""}</span></div>}
          {isComp&&(<>

            <div className="sub-head">Logistics</div>

            </div>))}
          </>)}
          {!isComp&&spotsLeft===0&&notEnrolled.length>0&&<div className="alert alert-amber">This clinic is full.</div>}
        </>)}

        {/* ── EDIT ── */}
        {evSec==="edit"&&(<>

          <div className="grid2">
            <div className="fg"><label className="fl">Start Date</label><input type="date" className="fc" value={ef.date} onChange={e=>setEf(x=>({...x,date:e.target.value}))}/></div>
            <div className="fg"><label className="fl">End Date</label><input type="date" className="fc" value={ef.endDate||ef.date} onChange={e=>setEf(x=>({...x,endDate:e.target.value}))}/></div>
          </div>
          {ef.date&&ef.endDate&&ef.endDate>=ef.date&&(

          )}
          <div className="fg"><label className="fl">Fee per rider (₪)</label><input type="number" className="fc" value={ef[feeKey]} onChange={e=>setEf(x=>({...x,[feeKey]:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Location</label><input className="fc" value={ef.location} onChange={e=>setEf(x=>({...x,location:e.target.value}))}/></div>
          {!isComp&&(<>
            <div className="fg"><label className="fl">Clinician</label><input className="fc" value={ef.clinician} onChange={e=>setEf(x=>({...x,clinician:e.target.value}))}/></div>
            <div className="grid2">
              <div className="fg"><label className="fl">Total Spots</label><input type="number" className="fc" value={ef.spotsTotal} onChange={e=>setEf(x=>({...x,spotsTotal:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Duration</label><input className="fc" value={ef.duration} onChange={e=>setEf(x=>({...x,duration:e.target.value}))}/></div>
            </div>
          </>)}
          {isComp&&(<div className="fg"><label className="fl">Transporter</label>
            <select className="fc" value={ef.transporterId||""} onChange={e=>setEf(x=>({...x,transporterId:e.target.value||null}))}>
              <option value="">None</option>
              {(data.contacts||[]).filter(c=>c.roles?.includes("Transporter")).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>)}
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button className="btn btn-outline" style={{flex:1}} onClick={()=>setEvSec("details")}>Cancel</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={saveEdit}>Save Changes</button>

        </>)}

        {/* ── CONFIRM ── */}
        {evSec==="confirm"&&(<>
          <div className="sub-head" style={{marginBottom:12}}>Did this {isComp?"competition":"clinic"} take place?</div>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            <button className="btn btn-block" style={{flex:1,background:status==="completed"?T.green:T.greenBg,color:status==="completed"?"#fff":T.green,border:`2px solid ${T.green}`,fontWeight:700}} onClick={()=>patchEvent({status:"completed"})}>
              ✓ Yes — Confirmed
            </button>
            <button className="btn btn-block" style={{flex:1,background:status==="cancelled"?T.red:T.redBg,color:status==="cancelled"?"#fff":T.red,border:`2px solid ${T.red}`,fontWeight:700}} onClick={()=>patchEvent({status:"cancelled"})}>
              ✗ Cancelled
            </button>

          {status==="scheduled"&&<div className="alert alert-blue" style={{fontSize:12}}>Mark as confirmed to include fees in income and billing.</div>}
          {status==="completed"&&<div className="alert alert-green" style={{fontSize:12}}>✓ Confirmed — {fmt(totalFee)} has been added to income and billing for each rider.</div>}
          {status==="cancelled"&&<div className="alert" style={{background:T.redBg,color:T.red,border:`1px solid ${T.red}`,fontSize:12}}>Cancelled — fees excluded from income and billing.</div>}
          {status!=="scheduled"&&<button className="btn btn-outline btn-block" style={{marginTop:8}} onClick={()=>patchEvent({status:"scheduled"})}>↩ Revert to Scheduled</button>}
        </>)}

        {/* ── BILLING ── */}
        {evSec==="billing"&&(<>
          <div className="bill-hero" style={{flexDirection:"column",alignItems:"flex-start",gap:4,marginBottom:14}}>
            <div className="bill-hero-label">Total {isComp?"Competition":"Clinic"} Revenue</div>
            <div className="bill-hero-amount" style={{color:status==="completed"?T.blue:T.slateLight}}>{fmt(status==="completed"?totalFee:0)}</div>
            {status!=="completed"&&<div style={{fontSize:12,color:"#9096B8"}}>Confirm the event to count fees in income</div>}
          </div>
          <div className="row"><span className="row-label">Fee per rider</span><span className="row-value">{fmt(live[feeKey]||0)}</span></div>
          <div className="row"><span className="row-label">Enrolled riders</span><span className="row-value">{enrolled.length}</span></div>
          <div className="div"/>
          <div className="sub-head">Per Rider Breakdown</div>
          {enrolled.map(c=>{
            const paid=(data.payments||[]).filter(p=>p.contactId===c.id).reduce((s,p)=>s+p.amount,0);
            const compOwed=(data.competitions||[]).filter(e=>(e.contactIds||e.clientIds||[]).includes(c.id)&&e.status==="completed").reduce((s,e)=>s+(e.fee||0),0);
            const clinOwed=(data.clinics||[]).filter(e=>(e.contactIds||e.clientIds||[]).includes(c.id)&&e.status==="completed").reduce((s,e)=>s+(e.price||0),0);
            return (<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:`1px solid ${T.border}`,marginBottom:8,cursor:"pointer",background:T.white}} onClick={()=>setModal({type:"contactDetail",payload:c})}>
              <div><div style={{fontSize:13,fontWeight:600,color:T.navy}}>{c.name}</div><div style={{fontSize:11,color:T.slateLight}}>Tap to view full billing</div></div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:600,color:T.blue}}>{fmt(live[feeKey]||0)}</div>
              </div>
            </div>);
          })}
          {enrolled.length>0&&(<div className="row" style={{borderTop:`1.5px solid ${T.navy}`,paddingTop:8,marginTop:4}}>
            <span className="row-label" style={{fontWeight:700,fontSize:14}}>Total to bill</span>
            <span className="row-value" style={{fontFamily:"'Cinzel',serif",fontSize:18,color:T.navy,fontWeight:700}}>{fmt(totalFee)}</span>
          </div>)}
        </>)}
      </>
    );
}

function ContactsTab({data, upd, setModal, close, contactSearch, setContactSearch, contactFilter, setContactFilter}) {
  const ROLE_FILTERS = ["All","Rider","Instructor","Coach","Groomer","Transporter","Ranch Manager","Horse Owner"];
  const contacts = data.contacts||[];

  const list = contacts.filter(c=>{
    const byStatus = contactFilter==="active"||contactFilter==="inactive" ? c.status===contactFilter : true;
    const byRole   = contactFilter==="all"||ROLE_FILTERS.slice(1).indexOf(contactFilter)<0 ? true
                   : c.roles?.some(r=>r.toLowerCase().includes(contactFilter.toLowerCase()));
    const bySearch = !contactSearch || c.name.toLowerCase().includes(contactSearch.toLowerCase());
    return byStatus && byRole && bySearch;
  });

  const isNewRider = (c) => {
    const done = (data.scheduleEvents||[]).filter(e=>e.contactIds?.includes(c.id)&&e.status==="completed"&&e.serviceKey!=="vet-session").length;
    return done < 10 && c.roles?.includes("Rider") && c.status==="active";
  };

  const cycleStatus = (ev, c) => {
    ev.stopPropagation();
    upd("contacts",contacts.map(x=>x.id===c.id?{...x,status:x.status==="active"?"inactive":"active"}:x));
  };

  return (
    <div>
      <div className="sec-hdr">
        <div className="sec-title">Contacts</div>
        <span className="sec-count">{contacts.filter(c=>c.status==="active").length} active</span>
      </div>
      <div className="chips">
        {[["all","All"],["active","Active"],["inactive","Inactive"],["Rider","Riders"],["Instructor","Instructors"],["Groomer","Groomers"],["Transporter","Transporters"]].map(([v,l])=>(
          <button key={v} className={`chip${contactFilter===v?" on":""}`} onClick={()=>setContactFilter(v)}>{l}</button>
        ))}
      </div>

      {list.map(c=>{
        const dot  = c.color||T.blue;
        const evts = (data.scheduleEvents||[]).filter(e=>e.contactIds?.includes(c.id));
        const compFees  = (data.competitions||[]).filter(e=>(e.contactIds||e.clientIds||[]).includes(c.id)&&e.status==="completed").reduce((s,e)=>s+(e.fee||0),0);
        const clinFees  = (data.clinics||[]).filter(e=>(e.contactIds||e.clientIds||[]).includes(c.id)&&e.status==="completed").reduce((s,e)=>s+(e.price||0),0);
        const bal  = evts.filter(e=>e.status==="completed"&&e.serviceKey!=="vet-session").reduce((s,e)=>s+contactFee(e,c.id),0) + compFees + clinFees;
        const paid = (data.payments||[]).filter(p=>p.contactId===c.id).reduce((s,p)=>s+p.amount,0);
        const due  = bal - paid;
        const newRider = isNewRider(c);
        const done = evts.filter(e=>e.status==="completed").length;
        return (
          <div key={c.id} className="card" style={{borderLeft:`4px solid ${dot}`}}
            onClick={()=>setModal({type:"contactDetail",payload:c})}>
            <div className="card-top">
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:dot,flexShrink:0}}/>
                <div>
                  <div className="card-name">{c.name}</div>
                  <div className="card-sub">{(c.roles||[]).join(" · ")}</div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <button onClick={ev=>cycleStatus(ev,c)} style={{background:c.status==="active"?T.greenBg:T.redBg,color:c.status==="active"?T.green:T.red,border:`1px solid ${c.status==="active"?T.green:T.red}`,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                  {c.status} ⇄
                </button>
                {newRider&&<span className="badge badge-blue" style={{fontSize:10}}>New · {done}/10</span>}
              </div>
            </div>
            {c.roles?.includes("Rider")&&<div className="row"><span className="row-label">Balance due</span><span className="row-value" style={{color:due>0?T.red:due<0?T.green:T.slate,fontWeight:due!==0?700:400}}>{due>0?`(${fmt(due)})`:due<0?`+${fmt(Math.abs(due))} credit`:"Settled"}</span></div>}
            <div className="row"><span className="row-label">Phone</span><span className="row-value">{c.phone}</span></div>
            {newRider&&(
              <div style={{marginTop:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.blue,marginBottom:3}}><span>New rider progress</span><span style={{fontWeight:600}}>{done}/10</span></div>
                <div style={{height:5,borderRadius:3,background:T.border,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:`${Math.min(done/10*100,100)}%`,background:T.blue}}/></div>
              </div>
            )}
          </div>
        );
      })}
      {list.length===0&&<div className="empty"><div className="empty-ico">👤</div><div className="empty-txt">No contacts found.</div></div>}
    </div>
  );
}

function HorsesTab({data, upd, setModal, close, horseSearch, setHorseSearch, horseFilter, setHorseFilter}) {

      <div className="chips">
        {[["all","All"],["in-house","In-House"],["client","Client-Owned"],["therapeutic","Therapy Suited"]].map(([v,l])=>(

        + Add Horse
      </button>
      {list.map(h=>{
        const lvl=wlLvl(h); const pct=Math.round(h.weeklyLessons/h.maxWeekly*100);
        const housingIcon = h=>h.housing==="pasture"?"🌿":h.housing==="hybrid"?"🔄":"🏠";
        const inPasture = h.housing==="pasture";
        // check for expiring vaccines (within 30 days)
        const today = new Date(TODAY+"T12:00:00");
        const expiringVax = (h.medicalRecords||[]).filter(r=>{
          if (r.type!=="Vaccination"||!r.expiryDate) return false;
          const exp = new Date(r.expiryDate+"T12:00:00");
          const days = Math.ceil((exp-today)/(1000*60*60*24));
          return days>=0 && days<=30;
        });
        const expiredVax = (h.medicalRecords||[]).filter(r=>{
          if (r.type!=="Vaccination"||!r.expiryDate) return false;
          return new Date(r.expiryDate+"T12:00:00") < today;
        });
        return (
          <div key={h.id} className="card" onClick={()=>setModal({type:"horseDetail",payload:h})}>
            <div className="card-top">
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div className="card-name">{h.name}</div>
                  <span style={{fontSize:12}} title={h.housing==="pasture"?"In Pasture":h.housing==="hybrid"?"Hybrid":"In Stall"}>{h.housing==="pasture"?"🌿":h.housing==="hybrid"?"🔄":"🏠"}</span>
                </div>
                <div className="card-sub">{h.breed} · {h.color} · Age {h.age}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span className={`badge badge-${h.type==="in-house"?"blue":"amber"}`}>{h.type==="in-house"?"In-House":"Client"}</span>
                {h.suitedFor.includes("Therapeutic")&&<span className="badge badge-teal">Therapy</span>}
                {expiredVax.length>0&&<span className="badge badge-red">Vax Expired</span>}
                {expiringVax.length>0&&expiredVax.length===0&&<span className="badge badge-amber">Vax Due Soon</span>}
              </div>
            </div>
            {h.ownerId&&<div className="row"><span className="row-label">Owner</span><span className="row-value">{(data.contacts||[]).find(c=>c.id===h.ownerId)?.name||"—"}</span></div>}
            <div className="wb-wrap">
              <div className="wb-meta"><span>Weekly workload</span><span style={{fontWeight:600,color:lvl==="high"?T.red:lvl==="med"?T.amber:T.green}}>{h.weeklyLessons}/{h.maxWeekly} · {pct}%</span></div>
              <div className="wb-track"><div className={`wb-fill wb-${lvl}`} style={{width:`${pct}%`}}/></div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ScheduleTab({data, upd, setModal, close, schedView, setSchedView, schedDate, setSchedDate, schedSearch, setSchedSearch, schedFilter, setSchedFilter, schedCoach, setSchedCoach}) {
  const events = data.scheduleEvents||[];

  const addDays = (iso,n)=>{ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
  const weekStart = iso=>{ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()-d.getDay()); return d.toISOString().split("T")[0]; };
  const DAY_NAMES   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const evColor = (ev) => {
    if (ev.status==="cancelled") return "#B0B8D4";
    if (ev.contactIds?.length===1) {
      const c = data.contacts?.find(x=>x.id===ev.contactIds[0]);
      const base = c?.color||T.blue;
      return ev.status==="completed" ? base+"99" : base;
    }
    return ev.status==="completed" ? T.blue+"99" : T.blue;
  };
  const textOnColor = hex => {
    if (!hex||hex.length<7) return "#fff";
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return (r*299+g*587+b*114)/1000>150?"#1A1F5E":"#ffffff";
  };
  const eventsOnDate = (iso) => [
    ...((data.competitions||[]).filter(e=>e.date===iso).map(e=>({...e,kind:"competition"}))),
    ...((data.clinics||[]).filter(e=>e.date===iso).map(e=>({...e,kind:"clinic"}))),
  ];
  const getNames = (ev) => (ev.contactIds||[]).map(id=>data.contacts?.find(c=>c.id===id)?.name?.split(" ")[0]).filter(Boolean).join(", ");
  const getHorseNames = (ev) => (ev.horseIds||[]).map(id=>data.horses?.find(h=>h.id===id)?.name).filter(Boolean).join(", ");

  const CalNav = ({title,onPrev,onNext})=>(
    <div className="cal-nav">
      <button className="cal-nav-btn" onClick={onPrev}>‹</button>
      <div className="cal-nav-title">{title}</div>
      <button className="cal-nav-btn" onClick={onNext}>›</button>
    </div>
  );

  const EventCard = ({ev, compact=false})=>{
    const color   = evColor(ev);
    const fg      = textOnColor(ev.status==="cancelled"?"#B0B8D4":data.contacts?.find(c=>c.id===ev.contactIds?.[0])?.color||T.blue);
    const names   = getNames(ev);
    const horses  = getHorseNames(ev);
    const svc     = SERVICE_TYPES.find(s=>s.key===ev.serviceKey);
    return (
      <div className={compact?"":""} style={{borderRadius:8,padding:"9px 12px",marginBottom:compact?3:8,cursor:"pointer",background:color,opacity:ev.status==="cancelled"?0.6:1,transition:"opacity .15s"}}
        onClick={()=>setModal({type:"scheduleDetail",payload:ev})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:compact?11:13,fontWeight:700,color:fg,lineHeight:1.2}}>{ev.time} · {names||ev.eventType}</div>
            {!compact&&<div style={{fontSize:11,color:fg,opacity:.85,marginTop:2}}>{ev.eventType}{horses?` · ${horses}`:""}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
            {ev.recurrence!=="None"&&<span style={{fontSize:9,color:fg,opacity:.8}}>↻</span>}
            {!compact&&<span style={{fontSize:11,fontWeight:600,color:fg}}>{fmt(ev.price||0)}</span>}
          </div>
        </div>
        {!compact&&svc&&<div style={{fontSize:10,color:fg,opacity:.75,marginTop:3,background:"rgba(255,255,255,.18)",borderRadius:4,padding:"1px 6px",display:"inline-block"}}>{svc.label}</div>}
      </div>
    );
  };

  // -- LIST VIEW --
  const ListView = ()=>{
    const coaches = [...new Set((data.scheduleEvents||[]).map(e=>e.instructor).filter(Boolean))].sort();
    const sorted=[...events].sort((a,b)=>b.date.localeCompare(a.date)||a.time.localeCompare(b.time));
    const list = sorted.filter(ev=>{
      const byF = schedFilter==="all" ? true : ev.status===schedFilter||ev.eventType===schedFilter;
      const byCoach = schedCoach==="all" || ev.instructor===schedCoach;
      const names = getNames(ev);
      return byF&&byCoach&&(!schedSearch||names.toLowerCase().includes(schedSearch.toLowerCase())||ev.eventType.toLowerCase().includes(schedSearch.toLowerCase()));
    });
    return (
      <>
        <div className="chips">
          {[["all","All"],["scheduled","Scheduled"],["completed","Completed"],["cancelled","Cancelled"]].map(([v,l])=>(
            <button key={v} className={`chip${schedFilter===v?" on":""}`} onClick={()=>setSchedFilter(v)}>{l}</button>
          ))}
        </div>
        {coaches.length>1&&(
          <div className="fg" style={{marginBottom:10}}>
            <select className="fc" value={schedCoach} onChange={e=>setSchedCoach(e.target.value)}>
              <option value="all">All Coaches</option>
              {coaches.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        )}
        {list.map(ev=>{
          const color=evColor(ev);
          const names=getNames(ev);
          const horses=getHorseNames(ev);
          const svc=SERVICE_TYPES.find(s=>s.key===ev.serviceKey);
          return (
            <div key={ev.id} className="card" style={{borderLeft:`4px solid ${color}`}} onClick={()=>setModal({type:"scheduleDetail",payload:ev})}>
              <div className="card-top">
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {ev.contactIds?.length===1&&<div style={{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}/>}
                  <div>
                    <div className="card-name">{names||ev.eventType}</div>
                    <div className="card-sub">{fmtD(ev.date)} · {ev.time} · {ev.duration} min</div>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  <span className={`badge badge-${ev.status==="completed"?"green":ev.status==="cancelled"?"red":"blue"}`}>{cap(ev.status)}</span>
                  {ev.recurrence!=="None"&&<span className="badge badge-slate" style={{fontSize:10}}>↻ {ev.recurrence}</span>}
                </div>
              </div>
              <div className="row"><span className="row-label">Type</span><span className="row-value">{ev.eventType}</span></div>
              {svc&&<div className="row"><span className="row-label">Service</span><span className="row-value"><span style={{background:`${color}22`,color,borderRadius:4,padding:"1px 7px",fontSize:11,fontWeight:600}}>{svc.label}</span></span></div>}
              {horses&&<div className="row"><span className="row-label">Horse(s)</span><span className="row-value">{horses}</span></div>}
              <div className="row"><span className="row-label">Fee</span><span className="row-value">{fmt(ev.price||0)}</span></div>
              {ev.status==="cancelled"&&<div className="alert alert-amber" style={{marginTop:8,marginBottom:0,fontSize:12}}>Cancelled: {ev.cancellationReason}</div>}
            </div>
          );
        })}
        {list.length===0&&<div className="empty"><div className="empty-ico">📋</div><div className="empty-txt">No events found.</div></div>}
      </>
    );
  };

  // -- DAILY VIEW --
  const DayView = ()=>{
    const dayEvs  = [...events].filter(e=>e.date===schedDate&&(schedCoach==="all"||e.instructor===schedCoach)).sort((a,b)=>a.time.localeCompare(b.time));
    const dayExts = eventsOnDate(schedDate);
    const d = new Date(schedDate+"T12:00:00");
    const isToday = schedDate===TODAY;
    const HOURS = Array.from({length:14},(_,i)=>i+7);
    const byHour = {};
    dayEvs.forEach(e=>{ const h=parseInt(e.time.split(":")[0]); if(!byHour[h])byHour[h]=[]; byHour[h].push(e); });
    const fmtHour = h=>{ const ap=h>=12?"pm":"am"; const d=h>12?h-12:h===0?12:h; return `${d}${ap}`; };
    return (
      <>
        <CalNav title={isToday?"Today":d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
          onPrev={()=>setSchedDate(addDays(schedDate,-1))} onNext={()=>setSchedDate(addDays(schedDate,1))}/>
        {isToday&&<div style={{textAlign:"center",fontSize:11,color:T.blue,fontWeight:600,marginBottom:10,letterSpacing:1,textTransform:"uppercase"}}>Today</div>}
        <div className="day-header">
          <div className="day-title">{d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
          <div className="day-count">{dayEvs.length} event{dayEvs.length!==1?"s":""}{dayExts.length>0?` · ${dayExts.length} comp/clinic`:""}</div>
        </div>
        {dayExts.map(e=>(
          <div key={e.id} style={{borderRadius:8,padding:"8px 12px",marginBottom:8,background:e.kind==="competition"?T.amberBg:T.offWhite,border:`1px solid ${e.kind==="competition"?T.amber:T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setModal({type:"eventDetail",payload:e})}>
            <div><div style={{fontSize:13,fontWeight:600,color:T.navy}}>{e.kind==="competition"?"🏆":"📋"} {e.name}</div><div style={{fontSize:11,color:T.slateLight}}>{e.location||e.clinician}</div></div>
            <span className={`badge badge-${e.kind==="competition"?"amber":"slate"}`}>{cap(e.kind)}</span>
          </div>
        ))}
        {dayEvs.length===0&&dayExts.length===0&&<div className="empty"><div className="empty-ico">📅</div><div className="empty-txt">Nothing scheduled.</div></div>}
        {HOURS.map(h=>{
          const evs=byHour[h]||[];
          if(!evs.length) return null;
          return (
            <div key={h} className="time-slot">
              <div className="time-label">{fmtHour(h)}</div>
              <div style={{flex:1}}>
                {evs.map(ev=>{
                  const bg=evColor(ev);
                  const fg=textOnColor(ev.status==="cancelled"?"#B0B8D4":data.contacts?.find(c=>c.id===ev.contactIds?.[0])?.color||T.blue);
                  const names=getNames(ev); const horses=getHorseNames(ev);
                  return (
                    <div key={ev.id} onClick={()=>setModal({type:"scheduleDetail",payload:ev})}
                      style={{borderRadius:8,padding:"9px 12px",marginBottom:6,cursor:"pointer",background:bg,opacity:ev.status==="cancelled"?0.55:ev.status==="completed"?0.85:1}}>
                      <div style={{fontSize:11,fontWeight:600,color:fg,opacity:.8,marginBottom:2}}>{ev.time} · {ev.duration} min{ev.status!=="scheduled"?` · ${ev.status}`:""}{ev.recurrence!=="None"?` · ↻ ${ev.recurrence}`:""}</div>
                      <div style={{fontSize:13,fontWeight:700,color:fg}}>{names||ev.eventType}</div>
                      <div style={{fontSize:11,color:fg,opacity:.85,marginTop:2}}>{ev.eventType}{horses?` · ${horses}`:""}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        {schedDate!==TODAY&&<div style={{textAlign:"center",marginTop:16}}><button className="btn btn-outline" style={{fontSize:12,padding:"7px 20px"}} onClick={()=>setSchedDate(TODAY)}>Jump to Today</button></div>}
      </>
    );
  };

  // -- WEEKLY VIEW --
  const WeekView = ()=>{
    const ws=weekStart(schedDate);
    const days=Array.from({length:7},(_,i)=>addDays(ws,i));
    const d0=new Date(ws+"T12:00:00"),d6=new Date(days[6]+"T12:00:00");
    const sameMonth=d0.getMonth()===d6.getMonth();
    const title=sameMonth
      ?`${MONTH_NAMES[d0.getMonth()]} ${d0.getDate()}-${d6.getDate()}`
      :`${MONTH_NAMES[d0.getMonth()].slice(0,3)} ${d0.getDate()} - ${MONTH_NAMES[d6.getMonth()].slice(0,3)} ${d6.getDate()}`;
    const weekEvs=events.filter(e=>days.includes(e.date)&&(schedCoach==="all"||e.instructor===schedCoach));
    const allTimes=[...new Set(weekEvs.map(e=>e.time))].sort();
    const extsByDay={};
    days.forEach(d=>{extsByDay[d]=eventsOnDate(d);});
    const hasExts=days.some(d=>extsByDay[d].length>0);

    const colW = `${Math.floor(100/8)}%`;
    const cellStyle = (isT) => ({
      border:`1px solid ${T.border}`, padding:"3px 2px", verticalAlign:"top",
      background: isT ? "rgba(61,107,158,.03)" : T.white, minWidth:36,
    });
    const headStyle = (isT) => ({
      border:`1px solid ${T.border}`, padding:"8px 3px", textAlign:"center",
      fontSize:10, fontWeight:600, color: isT?T.blue:T.slateLight,
      letterSpacing:".5px", textTransform:"uppercase", cursor:"pointer",
      background: isT?T.skyTint:T.offWhite,
    });

    return (
      <div>
        <CalNav title={title} onPrev={()=>setSchedDate(addDays(ws,-7))} onNext={()=>setSchedDate(addDays(ws,7))}/>

        <div style={{overflowX:"auto",borderRadius:10,border:`1px solid ${T.border}`,marginBottom:14}}>
          <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
            <thead>
              <tr>
                <th style={{...headStyle(false),width:40}}>Time</th>
                {days.map((d,i)=>{
                  const dn=new Date(d+"T12:00:00");
                  const isT=d===TODAY;
                  return (
                    <th key={d} style={headStyle(isT)} onClick={()=>{setSchedDate(d);setSchedView("day");}}>
                      <div>{DAY_NAMES[i]}</div>
                      {isT
                        ? <span style={{background:T.blue,color:"#fff",borderRadius:"50%",width:20,height:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,marginTop:2}}>{dn.getDate()}</span>
                        : <span style={{fontSize:13,fontWeight:700,color:T.navy,display:"block",marginTop:2}}>{dn.getDate()}</span>
                      }
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {hasExts && (
                <tr>
                  <td style={{...cellStyle(false),fontSize:9,color:T.amber,fontWeight:700,textAlign:"right",paddingRight:4}}>EVT</td>
                  {days.map(d=>{
                    const isT=d===TODAY;
                    return (
                      <td key={d} style={cellStyle(isT)}>
                        {extsByDay[d].map(e=>(
                          <span key={e.id}
                            onClick={()=>setModal({type:"eventDetail",payload:e})}
                            style={{display:"block",borderRadius:3,padding:"2px 4px",marginBottom:2,fontSize:9,fontWeight:700,lineHeight:1.3,cursor:"pointer",
                              background:e.kind==="competition"?T.amberBg:"#F1F5F9",
                              color:e.kind==="competition"?T.amber:T.slate,
                              borderLeft:`2px solid ${e.kind==="competition"?T.amber:T.slateLight}`,
                              overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                            {e.kind==="competition"?"T":"C"} {e.name.split(" ")[0]}
                          </span>
                        ))}
                      </td>
                    );
                  })}
                </tr>
              )}
              {allTimes.length===0 && (
                <tr>
                  <td colSpan={8} style={{padding:20,textAlign:"center",color:T.slateLight,fontSize:13}}>No events this week.</td>
                </tr>
              )}
              {allTimes.map(time=>(
                <tr key={time}>
                  <td style={{...cellStyle(false),fontSize:10,color:T.slateLight,textAlign:"right",paddingRight:4,fontWeight:500}}>{time}</td>
                  {days.map(d=>{
                    const dayL=weekEvs.filter(e=>e.date===d&&e.time===time);
                    const isT=d===TODAY;
                    return (
                      <td key={d} style={cellStyle(isT)}>
                        {dayL.map(ev=>{
                          const bg=evColor(ev);
                          const fg=textOnColor(ev.status==="cancelled"?"#B0B8D4":data.contacts?.find(c=>c.id===ev.contactIds?.[0])?.color||T.blue);
                          const names=getNames(ev);
                          return (
                            <span key={ev.id}
                              onClick={()=>setModal({type:"scheduleDetail",payload:ev})}
                              style={{display:"block",borderRadius:4,padding:"3px 5px",marginBottom:2,fontSize:10,fontWeight:600,lineHeight:1.3,cursor:"pointer",
                                background:bg,color:fg,
                                opacity:ev.status==="cancelled"?0.5:ev.status==="completed"?0.75:1,
                                overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                              {names||ev.eventType}
                            </span>
                          );
                        })}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:T.slateLight,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:".6px"}}>Riders</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {(data.contacts||[]).filter(c=>c.status==="active"&&c.roles?.includes("Rider")).map(c=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.slate}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:c.color||T.blue,flexShrink:0}}/>{c.name.split(" ")[0]}
              </div>
            ))}
          </div>
        </div>
        <div style={{fontSize:11,color:T.slateLight,textAlign:"center",marginBottom:4}}>Tap a day header for daily view - Tap an event for details</div>
        {schedDate!==TODAY&&<div style={{textAlign:"center",marginTop:8}}><button className="btn btn-outline" style={{fontSize:12,padding:"7px 20px"}} onClick={()=>setSchedDate(TODAY)}>Jump to Today</button></div>}
      </div>
    );
  };

  return (
    <div>
      <div className="sec-hdr"><div className="sec-title">Schedule</div><span className="sec-count">{events.length} events</span></div>
      <div className="view-toggle">
        {[["list","List"],["day","Daily"],["week","Weekly"]].map(([v,l])=>(
          <button key={v} className={`view-btn${schedView===v?" on":""}`} onClick={()=>setSchedView(v)}>{l}</button>
        ))}
      </div>
      {(()=>{
        const coaches=[...new Set((data.scheduleEvents||[]).map(e=>e.instructor).filter(Boolean))].sort();
        return coaches.length>1?(
          <div className="fg" style={{marginBottom:10}}>
            <select className="fc" value={schedCoach} onChange={e=>setSchedCoach(e.target.value)}>
              <option value="all">👤 All Coaches</option>
              {coaches.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        ):null;
      })()}
      {schedView==="list"&&<ListView/>}
      {schedView==="day" &&<DayView/>}
      {schedView==="week"&&<WeekView/>}
    </div>
  );
}

function CloudSetup({onConnect}) {
  const [binId, setBinId] = React.useState("");
  const [apiKey, setApiKey] = React.useState("");
  const [mode, setMode] = React.useState("choice"); // choice | create | connect
  const [creating, setCreating] = React.useState(false);
  const [error, setError] = React.useState("");

  const createBin = async () => {
    if(!apiKey.trim()){ setError("Please paste your X-Master-Key first."); return; }
    setCreating(true); setError("");
    try {
      const res = await fetch("https://api.jsonbin.io/v3/b", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Master-Key": apiKey.trim(), "X-Bin-Name": "SheerTalentCRM" },
        body: JSON.stringify(SEED),
      });
      if(!res.ok) throw new Error("Could not create bin. Check your API key.");
      const json = await res.json();
      const newBinId = json.metadata.id;
      onConnect(newBinId, apiKey.trim());
    } catch(e) { setError(e.message||"Something went wrong."); }
    setCreating(false);
  };

  const connectExisting = () => {
    if(!binId.trim()||!apiKey.trim()){ setError("Please fill in both fields."); return; }
    onConnect(binId.trim(), apiKey.trim());
  };

  return (
    <div style={{minHeight:"100vh",background:T.offWhite,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:400,width:"100%",background:T.white,borderRadius:16,padding:24,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:700,color:T.navy,marginBottom:6,textAlign:"center"}}>Sheer Talent</div>
        <div style={{fontSize:13,color:T.slateLight,textAlign:"center",marginBottom:20}}>Connect shared cloud storage so everyone sees the same data.</div>

        {mode==="choice"&&(<>
          <div style={{fontSize:13,color:T.slate,marginBottom:16,lineHeight:1.6}}>
            This app uses a free service called <strong>JSONBin.io</strong> to store data in the cloud, so you and your team always see the same up-to-date information.
          </div>
          <button className="btn btn-primary btn-block" style={{marginBottom:10}} onClick={()=>setMode("create")}>
            🆕 First time — Set up cloud storage
          </button>
          <button className="btn btn-outline btn-block" onClick={()=>setMode("connect")}>
            🔗 I already have a Bin ID — Connect
          </button>
        </>)}

        {mode==="create"&&(<>
          <ol style={{fontSize:13,color:T.slate,paddingLeft:18,marginBottom:16,lineHeight:1.9}}>
            <li>Go to <strong>jsonbin.io</strong> and sign up (free, no card needed)</li>
            <li>Go to <strong>API Keys</strong> in your account</li>
            <li>Copy your <strong>X-Master-Key</strong> and paste it below</li>
          </ol>
          <div className="fg"><label className="fl">X-Master-Key</label>
            <input className="fc" placeholder="Paste your key here" value={apiKey} onChange={e=>setApiKey(e.target.value)}/>
          </div>
          {error&&<div className="alert" style={{background:"#FEE2E2",color:"#991B1B",fontSize:12,marginBottom:10}}>{error}</div>}
          <button className="btn btn-primary btn-block" onClick={createBin} disabled={creating}>
            {creating?"Creating...":"Create Shared Storage"}
          </button>
          <button className="btn btn-outline btn-block" style={{marginTop:8}} onClick={()=>setMode("choice")}>← Back</button>
        </>)}

        {mode==="connect"&&(<>
          <div style={{fontSize:13,color:T.slate,marginBottom:14}}>Enter the Bin ID and API key that was set up on the other device.</div>
          <div className="fg"><label className="fl">Bin ID</label>
            <input className="fc" placeholder="e.g. 64f3a2..." value={binId} onChange={e=>setBinId(e.target.value)}/>
          </div>
          <div className="fg"><label className="fl">X-Master-Key</label>
            <input className="fc" placeholder="Paste the same key" value={apiKey} onChange={e=>setApiKey(e.target.value)}/>
          </div>
          {error&&<div className="alert" style={{background:"#FEE2E2",color:"#991B1B",fontSize:12,marginBottom:10}}>{error}</div>}
          <button className="btn btn-primary btn-block" onClick={connectExisting}>Connect</button>
          <button className="btn btn-outline btn-block" style={{marginTop:8}} onClick={()=>setMode("choice")}>← Back</button>
        </>)}

        <div style={{fontSize:11,color:T.slateLight,textAlign:"center",marginTop:16}}>
          Once connected, share the same Bin ID + Key with anyone who needs access to the same data.
        </div>
      </div>
    </div>
  );
}

function App() {
  const [cloudConfig, setCloudConfig] = useState(()=>{
    try {
      const saved = localStorage.getItem("sheertalent_cloud_config");
      return saved ? JSON.parse(saved) : null;
    } catch(e) { return null; }
  });
  const [cloudLoading, setCloudLoading] = useState(!!cloudConfig);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | synced | error | offline
  const [tab,   setTab]   = useState("schedule");
  const [data,  setData]  = useState(()=>{
    try {
      const saved = localStorage.getItem("sheertalent_data");
      return saved ? JSON.parse(saved) : SEED;
    } catch(e) { return SEED; }
  });
  const [modal, setModal] = useState(null);
  const [schedView,  setSchedView]  = useState("day");
  const [schedDate,  setSchedDate]  = useState(TODAY);
  const [contactSearch, setContactSearch] = useState("");
  const [contactFilter, setContactFilter] = useState("all");
  const [horseSearch,   setHorseSearch]   = useState("");
  const [horseFilter,   setHorseFilter]   = useState("all");
  const [schedSearch,   setSchedSearch]   = useState("");
  const [schedFilter,   setSchedFilter]   = useState("all");
  const [schedCoach,    setSchedCoach]    = useState("all");

  // -- Cloud connect handler --
  const handleCloudConnect = (binId, apiKey) => {
    const cfg = {binId, apiKey};
    localStorage.setItem("sheertalent_cloud_config", JSON.stringify(cfg));
    setCloudConfig(cfg);
    setCloudLoading(true);
  };

  // -- Load from cloud on connect --
  useEffect(()=>{
    if(!cloudConfig) return;
    let cancelled = false;
    setSyncStatus("syncing");
    fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}/latest`, {
      headers: { "X-Master-Key": cloudConfig.apiKey },
    })
      .then(res=>{ if(!res.ok) throw new Error("fetch failed"); return res.json(); })
      .then(json=>{
        if(cancelled) return;
        setData(json.record||SEED);
        setSyncStatus("synced");
        setCloudLoading(false);
      })
      .catch(()=>{
        if(cancelled) return;
        setSyncStatus("error");
        setCloudLoading(false);
      });
    return ()=>{ cancelled = true; };
  }, [cloudConfig]);

  // -- Save to localStorage always (offline cache) --
  useEffect(()=>{
    try { localStorage.setItem("sheertalent_data", JSON.stringify(data)); }
    catch(e) { console.warn("localStorage full or unavailable:", e); }
  }, [data]);

  // -- Save to cloud (debounced) whenever data changes, if connected --
  useEffect(()=>{
    if(!cloudConfig || cloudLoading) return;
    setSyncStatus("syncing");
    const t = setTimeout(()=>{
      fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": cloudConfig.apiKey },
        body: JSON.stringify(data),
      })
        .then(res=>{ if(!res.ok) throw new Error("save failed"); setSyncStatus("synced"); })
        .catch(()=>setSyncStatus("error"));
    }, 1200);
    return ()=>clearTimeout(t);
  }, [data, cloudConfig, cloudLoading]);

  useEffect(()=>{
    // Prevent zoom on app UI but keep it for images/attachments
    let meta = document.querySelector('meta[name="viewport"]');
    if (!meta) { meta = document.createElement('meta'); meta.name = 'viewport'; document.head.appendChild(meta); }
    meta.content = 'width=device-width, initial-scale=1, minimum-scale=1';
    return () => { meta.content = 'width=device-width, initial-scale=1'; };
  }, []);

  const close = () => setModal(null);
  const upd   = (key,val) => setData(d=>({...d,[key]:val}));

  const TABS = [
    {id:"dashboard", label:"Dashboard"}, {id:"contacts",  label:"Contacts"},
    {id:"horses",    label:"Horses"},    {id:"schedule",  label:"Schedule"},
    {id:"events",    label:"Events"},    {id:"billing",   label:"Billing"},

  /* -- Dashboard ------------------------------------------------------------ */

    const todayEvts  = (data.scheduleEvents||[]).filter(l=>l.date===TODAY&&l.status==="scheduled");

    const riderCount = (data.contacts||[]).filter(c=>c.status==="active"&&c.roles?.includes("Rider")).length;
    const hiWL       = (data.horses||[]).filter(h=>wlLvl(h)==="high");

    const getContact = id => data.contacts?.find(c=>c.id===id);

    // Forecast income
    const nowMonthKey = TODAY.slice(0,7);

      + (data.clinics||[]).filter(e=>e.date?.startsWith(nowMonthKey)&&e.status==="completed").reduce((s,e)=>s+(e.price||0)*(e.contactIds||[]).length,0);
    const plannedIncome = (data.scheduleEvents||[])

      .reduce((s,e)=>s+(e.price||0),0)

      + (data.clinics||[]).filter(e=>e.date?.startsWith(nowMonthKey)&&e.status!=="completed"&&e.status!=="cancelled").reduce((s,e)=>s+(e.price||0)*(e.contactIds||[]).length,0);
    const forecastTotal = confirmedIncome + plannedIncome;

              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:"#6EE7B7"}}>{fmt(forecastTotal)}</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#9096B8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Expenses</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:"#F87171"}}>{fmt(monthExpenses)}</div>
            </div>
            <div style={{background:profit>=0?"rgba(110,231,183,0.12)":"rgba(248,113,113,0.12)",borderRadius:8,padding:"10px 8px",textAlign:"center",border:`1px solid ${profit>=0?"rgba(110,231,183,0.3)":"rgba(248,113,113,0.3)"}`}}>
              <div style={{fontSize:10,color:"#9096B8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Profit</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:profit>=0?"#6EE7B7":"#F87171"}}>{profit>=0?"+":""}{fmt(profit)}</div>
            </div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10,display:"flex",justifyContent:"space-between"}}>
            <div style={{fontSize:11,color:"#9096B8"}}>✓ Confirmed <span style={{color:"#6EE7B7",fontWeight:600}}>{fmt(confirmedIncome)}</span></div>
            <div style={{fontSize:11,color:"#9096B8"}}>📅 Planned <span style={{color:"#93C5FD",fontWeight:600}}>{fmt(plannedIncome)}</span></div>
          </div>
        </div>

        <div className="stat-grid">
          <div className="stat-box"><div className="stat-num">{riderCount}</div><div className="stat-lbl">Active Riders</div></div>
          <div className="stat-box"><div className="stat-num">{(data.horses||[]).length}</div><div className="stat-lbl">Horses</div></div>
          <div className="stat-box"><div className="stat-num">{todayEvts.length}</div><div className="stat-lbl">Today</div></div>
        </div>
        {hiWL.length>0&&<div className="alert alert-amber">⚠️ {hiWL.map(h=>h.name).join(", ")} near max workload.</div>}

        {/* Vaccine expiry alerts */}
        {(()=>{
          const todayD = new Date(TODAY+"T12:00:00");
          const alerts = (data.horses||[]).flatMap(h=>
            (h.medicalRecords||[])
              .filter(r=>r.type==="Vaccination"&&r.expiryDate)
              .map(r=>({...r,horseName:h.name,daysLeft:Math.ceil((new Date(r.expiryDate+"T12:00:00")-todayD)/(1000*60*60*24))}))
              .filter(r=>r.daysLeft<=30)
          );
          if (!alerts.length) return null;
          return (
            <div className="alert alert-red" style={{marginBottom:12}}>
              <strong>Vaccination alerts:</strong>{" "}
              {alerts.map(a=>`${a.horseName} - ${a.name||a.type} ${a.daysLeft<0?"(EXPIRED)":"("+a.daysLeft+"d)"}`).join(" | ")}
            </div>
          );
        })()}
        <div className="sec-hdr"><div className="sec-title">Today's Schedule</div><span className="sec-count">{todayEvts.length} scheduled</span></div>
        {todayEvts.length===0&&<div className="alert alert-blue">No activities scheduled for today.</div>}
        {todayEvts.map(ev=>{
          const names  = (ev.contactIds||[]).map(id=>getContact(id)?.name.split(" ")[0]).filter(Boolean).join(", ");
          const color  = ev.contactIds?.length===1 ? (getContact(ev.contactIds[0])?.color||T.blue) : T.blue;
          const horses = (ev.horseIds||[]).map(id=>data.horses?.find(h=>h.id===id)?.name).filter(Boolean).join(", ");
          return (
            <div key={ev.id} className="card" style={{borderLeft:`4px solid ${color}`}} onClick={()=>setModal({type:"scheduleDetail",payload:ev})}>
              <div className="card-top">
                <div><div className="card-name">{ev.time} · {names||"No contact"}</div><div className="card-sub">{ev.eventType} · {ev.duration} min{horses?` · ${horses}`:""}</div></div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  <span className="badge" style={{background:`${color}22`,color,fontSize:11}}>{ev.eventType}</span>

              <div className="row"><span className="row-label">Fee</span><span className="row-value">{fmt(ev.price||0)}</span></div>

        <div className="div"/>
        <div className="sec-hdr"><div className="sec-title">Upcoming Events</div></div>
        {upcoming.map(e=>(<div key={e.id} className="card"><div className="card-top"><div><div className="card-name">{e.name}</div><div className="card-sub">{fmtD(e.date)}</div></div><span className="badge badge-amber">{fmt(e.fee||e.price||0)}</span></div></div>))}
        {upcoming.length===0&&<div className="empty"><div className="empty-ico">📅</div><div className="empty-txt">No upcoming events.</div></div>}
        <div className="div"/>
        <div className="bill-hero">
          <div><div className="bill-hero-label">Unbilled Balance</div><div className="bill-hero-amount">{fmt(billed)}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#94A3B8"}}>completed sessions</div><div style={{fontSize:20,fontFamily:"'Cinzel',serif",color:"#EBF2FA",marginTop:2}}>{(data.scheduleEvents||[]).filter(l=>l.status==="completed").length}</div></div>
        </div>
        <div className="div"/>
        <div style={{background:T.offWhite,borderRadius:10,padding:"10px 14px",border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:syncStatus==="error"?T.red:T.navy}}>

            </div>

  /* -- Schedule ------------------------------------------------------------- */

  function Schedule() {
