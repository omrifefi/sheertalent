      schedCoach={schedCoach} setSchedCoach={setSchedCoach}/>;
  }

  /* -- Events --------------------------------------------------------------- */
  function Events() {
    const [kind, setKind] = useState("all");

    // compute readiness score for a competition
    const compReadiness = (e) => {
      const enrolled = (e.contactIds||e.clientIds||[]);
      if (enrolled.length===0) return {pct:0,label:"No riders",color:T.slateLight,icon:"--"};
      const rChecks = e.riderChecks||{};
      const hChecks = e.horseChecks||{};

      // items: trailer(1) + per rider: payment(1) + horse assigned(1) + per unique horse: vet approved(1)
      const uniqueHorseIds = [...new Set(enrolled.map(id=>rChecks[id]?.horseId).filter(Boolean))];
      const totalItems = 1 + enrolled.length*2 + uniqueHorseIds.length;
      const trailerDone = e.trailerBooked ? 1 : 0;
      const paymentsDone = enrolled.filter(id=>rChecks[id]?.paymentSent).length;
      const horsesDone   = enrolled.filter(id=>rChecks[id]?.horseId).length;
      const vetsDone     = uniqueHorseIds.filter(hid=>hChecks[hid]?.vetApproved).length;
      const doneItems = trailerDone + paymentsDone + horsesDone + vetsDone;

      const pct = totalItems>0 ? Math.round((doneItems/totalItems)*100) : 0;
      const allDone = pct===100 && enrolled.length>0;
      const color = allDone ? T.green : pct>=60 ? T.amber : T.red;
      const label = allDone ? "All ready!" : `${doneItems}/${totalItems} items done`;
      return {pct,label,color,allDone};
    };

    // mini readiness bar
    const ReadinessBar = ({e}) => {
      const r = compReadiness(e);
      return (
        <div style={{marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:11,color:r.color,fontWeight:600}}>
              {r.allDone?"✓ ":""}Readiness · {r.label}
            </span>
            <span style={{fontSize:11,fontWeight:700,color:r.color}}>{r.pct}%</span>
          </div>
          <div style={{height:6,borderRadius:3,background:T.border,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:3,width:`${r.pct}%`,background:r.color,transition:"width .4s ease"}}/>
          </div>
        </div>
      );
    };

    return (
      <div>
        <div className="sec-hdr">
          <div className="sec-title">Events</div>
          <span className="sec-count">{data.competitions.length+data.clinics.length} total</span>
        </div>

        <div className="chips">
          {[["all","All"],["competition","Competitions"],["clinic","Clinics"]].map(([v,l])=>(
            <button key={v} className={`chip${kind===v?" on":""}`} onClick={()=>setKind(v)}>{l}</button>
          ))}
        </div>

        <div style={{display:"flex",gap:10,marginBottom:18}}>
          {(kind==="all"||kind==="competition")&&(
            <button className="btn btn-primary" style={{flex:1,fontSize:12}} onClick={()=>setModal({type:"addEvent",payload:{kind:"competition"}})}>
              + New Competition
            </button>
          )}
          {(kind==="all"||kind==="clinic")&&(
            <button className="btn btn-outline" style={{flex:1,fontSize:12}} onClick={()=>setModal({type:"addEvent",payload:{kind:"clinic"}})}>
              + New Clinic
            </button>
          )}
        </div>

        {/* Competitions */}
        {(kind==="all"||kind==="competition")&&(
          <>
            {kind==="all"&&<div className="sub-head" style={{marginBottom:10}}>Competitions</div>}
            {data.competitions.map(e=>{
              const enrolled = (e.contactIds||e.clientIds||[]).map(id=>data.contacts.find(c=>c.id===id)).filter(Boolean);
              const r = compReadiness(e);
              return (
                <div key={e.id} className="card"
                  style={{borderLeft:`3px solid ${r.allDone?T.green:enrolled.length===0?T.border:r.pct>=60?T.amber:T.red}`}}
                  onClick={()=>setModal({type:"eventDetail",payload:{...e,kind:"competition"}})}
                >
                  <div className="card-top">
                    <div>
                      <div className="card-name">{e.name}</div>
                      <div className="card-sub">{fmtD(e.date)}{e.endDate&&e.endDate!==e.date?` – ${fmtD(e.endDate)}`:""} · {e.location}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <span className="badge badge-amber">{fmt(e.fee)}</span>
                      {r.allDone&&enrolled.length>0&&<span className="badge badge-green" style={{fontSize:10}}>Ready ✓</span>}
                    </div>
                  </div>
                  <div className="row">
                    <span className="row-label">Riders</span>
                    <span className="row-value">{enrolled.length>0?enrolled.map(c=>c.name.split(" ")[0]).join(", "):"None yet"}</span>
                  </div>
                  <div className="row">
                    <span className="row-label">Trailer</span>
                    <span className="row-value" style={{color:e.trailerBooked?T.green:T.red}}>
                      {e.trailerBooked?"✓ Booked":"✗ Not booked"}
                    </span>
                  </div>
                  {enrolled.length>0&&<ReadinessBar e={e}/>}
                  {enrolled.length===0&&<div style={{fontSize:11,color:T.slateLight,marginTop:6}}>Tap to add riders →</div>}
                </div>
              );
            })}
            {data.competitions.length===0&&kind!=="all"&&<div className="empty"><div className="empty-ico">🏆</div><div className="empty-txt">No competitions yet.</div></div>}
          </>
        )}

        {/* Clinics */}
        {(kind==="all"||kind==="clinic")&&(
          <>
            {kind==="all"&&<div className="sub-head" style={{marginTop:data.competitions.length>0?16:0,marginBottom:10}}>Clinics</div>}
            {data.clinics.map(c=>{
              const enrolled = (c.contactIds||c.clientIds||[]).map(id=>(data.contacts||[]).find(x=>x.id===id)).filter(Boolean);
              const spotsLeft = (c.spotsTotal||0) - enrolled.length;
              return (
                <div key={c.id} className="card" onClick={()=>setModal({type:"eventDetail",payload:{...c,kind:"clinic"}})}>
                  <div className="card-top">
                    <div><div className="card-name">{c.name}</div><div className="card-sub">{fmtD(c.date)}{c.endDate&&c.endDate!==c.date?` – ${fmtD(c.endDate)}`:""} · {c.clinician}</div></div>
                    <span className="badge badge-slate">{fmt(c.price)}</span>
                  </div>
                  <div className="row"><span className="row-label">Riders</span><span className="row-value">{enrolled.length>0?enrolled.map(x=>x.name.split(" ")[0]).join(", "):"None yet"}</span></div>
                  <div className="row">
                    <span className="row-label">Spots</span>
                    <span className="row-value" style={{color:spotsLeft===0?T.red:spotsLeft<=2?T.amber:T.green}}>
                      {enrolled.length}/{c.spotsTotal} filled{spotsLeft===0?" -- FULL":""}
                    </span>
                  </div>
                  <div style={{fontSize:11,color:T.slateLight,marginTop:4}}>Tap to manage riders →</div>
                </div>
              );
            })}
            {data.clinics.length===0&&kind!=="all"&&<div className="empty"><div className="empty-ico">📋</div><div className="empty-txt">No clinics yet.</div></div>}
            {data.competitions.length===0&&data.clinics.length===0&&kind==="all"&&<div className="empty"><div className="empty-ico">📅</div><div className="empty-txt">No events yet. Create one above.</div></div>}
          </>
        )}
      </div>
    );
  }

  /* -- Billing -------------------------------------------------------------- */
  function Billing() {
    const nowMonthKey = TODAY.slice(0,7);
    const sums=(data.contacts||[]).filter(c=>c.roles?.includes('Rider')).map(c=>{
      const completed=(data.scheduleEvents||[]).filter(e=>e.contactIds?.includes(c.id)&&e.status==="completed"&&e.serviceKey!=="vet-session");
      const planned  =(data.scheduleEvents||[]).filter(e=>e.contactIds?.includes(c.id)&&e.status==="scheduled"&&e.date.startsWith(nowMonthKey)&&e.serviceKey!=="vet-session");
      const compFee  =(data.competitions||[]).filter(e=>(e.contactIds||e.clientIds||[]).includes(c.id)&&e.status==="completed").reduce((s,e)=>s+(e.fee||0),0);
      const clinFee  =(data.clinics||[]).filter(e=>(e.contactIds||e.clientIds||[]).includes(c.id)&&e.status==="completed").reduce((s,e)=>s+(e.price||0),0);
      const actualBilled = completed.reduce((s,l)=>s+contactFee(l,c.id),0) + compFee + clinFee;
      const plannedAmt   = planned.reduce((s,l)=>s+contactFee(l,c.id),0);
      const paid  = (data.payments||[]).filter(p=>p.contactId===c.id).reduce((s,p)=>s+p.amount,0);
      const balance = actualBilled - paid;
      return {...c,actualBilled,plannedAmt,compFee,clinFee,paid,balance,lessonCount:completed.length};
    }).filter(s=>s.balance>0||s.plannedAmt>0).sort((a,b)=>b.balance-a.balance);
    const grand=sums.reduce((s,c)=>s+c.balance,0);
    const grandPlanned=sums.reduce((s,c)=>s+c.plannedAmt,0);
    return (
      <div>
        <div className="bill-hero" style={{flexDirection:"column",alignItems:"flex-start",gap:4}}>
          <div style={{display:"flex",justifyContent:"space-between",width:"100%",alignItems:"flex-start"}}>
            <div><div className="bill-hero-label">Total Outstanding</div><div className="bill-hero-amount" style={{color:"#F87171"}}>{grand>0?`(${fmt(grand)})`:fmt(0)}</div></div>
            {grandPlanned>0&&<div style={{textAlign:"right"}}><div className="bill-hero-label">Planned This Month</div><div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:600,color:"#93C5FD"}}>{fmt(grandPlanned)}</div></div>}
          </div>
          <div style={{fontSize:12,color:"#9096B8"}}>{sums.filter(s=>s.balance>0).length} rider(s) with outstanding balance</div>
        </div>
        {sums.map(s=>{
          const dot=s.color||T.blue;
          return (
          <div key={s.id} className="card" style={{borderLeft:`4px solid ${dot}`}} onClick={()=>setModal({type:"contactDetail",payload:s})}>
            <div className="card-top">
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:dot,flexShrink:0}}/>
                <div><div className="card-name">{s.name}</div><div className="card-sub">{s.lessonCount} session(s){s.compFee>0?" + comp":""}{s.clinFee>0?" + clinic":""}</div></div>
              </div>
              <div style={{textAlign:"right"}}>
                {s.balance>0&&<div style={{fontFamily:"'Cinzel',serif",fontSize:18,color:T.red,fontWeight:700}}>({fmt(s.balance)})</div>}
                {s.balance<=0&&<div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.green}}>✓ Settled</div>}
              </div>
            </div>
            <div className="row"><span className="row-label">Billed</span><span className="row-value">{fmt(s.actualBilled)}</span></div>
            <div className="row"><span className="row-label">Paid</span><span className="row-value" style={{color:T.green}}>{fmt(s.paid)}</span></div>
            {s.compFee>0&&<div className="row"><span className="row-label">Competition fees</span><span className="row-value">{fmt(s.compFee)}</span></div>}
            {s.clinFee>0&&<div className="row"><span className="row-label">Clinic fees</span><span className="row-value">{fmt(s.clinFee)}</span></div>}
            {s.plannedAmt>0&&<div className="row"><span className="row-label">Planned this month</span><span className="row-value" style={{color:T.blue}}>{fmt(s.plannedAmt)}</span></div>}
          </div>
        );})}
        {sums.length===0&&<div className="empty"><div className="empty-ico">✅</div><div className="empty-txt">All accounts settled!</div></div>}
      </div>
    );
  }

  /* -- Expenses ------------------------------------------------------------- */
  function Expenses() {
    const [expandedCat, setExpandedCat] = useState(null);
    const [editingId,   setEditingId]   = useState(null);
    const [editF,       setEditF]       = useState({});
    const [showAdd,     setShowAdd]     = useState(false);
    const [addF,        setAddF]        = useState({date:TODAY,desc:"",category:"Vet",amount:"",horse:"",note:"",recurrence:"None"});

    const expenses = data.expenses||[];
    const total = expenses.reduce((s,e)=>s+e.amount,0);
    const CATS  = ["Vet","Farrier","Feed","Equipment","Facility","Transport","Other"];
    const REC_OPTS = ["None","Weekly","Monthly","Bi-monthly","Yearly"];

    const byCat = CATS.map(cat=>{
      const items = expenses.filter(e=>e.category===cat);
      return {cat, items, total:items.reduce((s,e)=>s+e.amount,0)};
    }).filter(c=>c.items.length>0);

    const saveEdit = (id) => {
      upd("expenses",expenses.map(e=>e.id===id?{...e,...editF,amount:+editF.amount}:e));
      setEditingId(null);
    };
    const deleteExp = (id) => upd("expenses",expenses.filter(e=>e.id!==id));

    const saveAdd = () => {
      if(!addF.desc||!addF.amount) return;
      const base = {...addF, amount:+addF.amount};
      let entries = [];
      if(addF.recurrence==="None") {
        entries = [{...base, id:Date.now()}];
      } else {
        const addDays = (d,n) => { const dt=new Date(d+"T12:00:00"); dt.setDate(dt.getDate()+n); return dt.toISOString().split("T")[0]; };
        const addMonths = (d,n) => { const dt=new Date(d+"T12:00:00"); dt.setMonth(dt.getMonth()+n); return dt.toISOString().split("T")[0]; };
        const counts = {"Weekly":12,"Monthly":12,"Bi-monthly":12,"Yearly":5};
        const count  = counts[addF.recurrence]||12;
        let cur = addF.date;
        for(let i=0;i<count;i++){
          entries.push({...base, id:Date.now()+i, date:cur, recurrenceGroup:Date.now()});
          if(addF.recurrence==="Weekly")      cur = addDays(cur,7);
          else if(addF.recurrence==="Monthly") cur = addMonths(cur,1);
          else if(addF.recurrence==="Bi-monthly") cur = addMonths(cur,2);
          else if(addF.recurrence==="Yearly") cur = addMonths(cur,12);
        }
      }
      upd("expenses",[...expenses,...entries]);
      setAddF({date:TODAY,desc:"",category:"Vet",amount:"",horse:"",note:"",recurrence:"None"});
      setShowAdd(false);
    };

    const recLabel = {"Weekly":"12 weekly","Monthly":"12 monthly","Bi-monthly":"12 bi-monthly","Yearly":"5 yearly"};

    return (
      <div>
        <div className="sec-hdr"><div className="sec-title">Expenses</div></div>
        <div className="bill-hero" style={{marginBottom:14}}>
          <div><div className="bill-hero-label">Month-to-Date</div><div className="bill-hero-amount">{fmt(total)}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#94A3B8"}}>{expenses.length} items</div></div>
        </div>

        <button className="btn btn-primary btn-block" style={{marginBottom:14}} onClick={()=>setShowAdd(x=>!x)}>
          {showAdd?"Cancel":"+ Add Expense"}
        </button>

        {showAdd&&(
          <div style={{background:T.offWhite,borderRadius:10,padding:14,marginBottom:14,border:`1px solid ${T.border}`}}>
            <div className="sub-head" style={{marginBottom:10}}>New Expense</div>
            <div className="grid2">
              <div className="fg"><label className="fl">Date</label><input type="date" className="fc" value={addF.date} onChange={e=>setAddF(x=>({...x,date:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Amount (₪)</label><input type="number" className="fc" value={addF.amount} onChange={e=>setAddF(x=>({...x,amount:e.target.value}))}/></div>
            </div>
            <div className="fg"><label className="fl">Description</label><input className="fc" placeholder="What was the expense?" value={addF.desc} onChange={e=>setAddF(x=>({...x,desc:e.target.value}))}/></div>
            <div className="grid2">
              <div className="fg"><label className="fl">Category</label>
                <select className="fc" value={addF.category} onChange={e=>setAddF(x=>({...x,category:e.target.value}))}>
                  {CATS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div className="fg"><label className="fl">Horse (optional)</label>
                <select className="fc" value={addF.horse} onChange={e=>setAddF(x=>({...x,horse:e.target.value}))}>
                  <option value="">None</option>
                  {(data.horses||[]).map(h=><option key={h.id} value={h.name}>{h.name}</option>)}
                </select>
              </div>
            </div>
            <div className="fg"><label className="fl">Recurrence</label>
              <select className="fc" value={addF.recurrence} onChange={e=>setAddF(x=>({...x,recurrence:e.target.value}))}>
                {REC_OPTS.map(r=><option key={r}>{r}</option>)}
              </select>
              {addF.recurrence!=="None"&&(
                <div style={{fontSize:12,color:T.blue,marginTop:4}}>
                  🔁 Creates {recLabel[addF.recurrence]} entries starting from the chosen date
                </div>
              )}
            </div>
            <div className="fg"><label className="fl">Note</label><input className="fc" placeholder="Optional note" value={addF.note} onChange={e=>setAddF(x=>({...x,note:e.target.value}))}/></div>
            <button className="btn btn-primary btn-block" onClick={saveAdd}>Save Expense</button>
          </div>
        )}

        {byCat.length===0&&<div className="empty"><div className="empty-ico">💰</div><div className="empty-txt">No expenses recorded yet.</div></div>}

        {byCat.map(({cat,items,total:catTotal})=>{
          const open = expandedCat===cat;
          const badgeColor = cat==="Vet"?"red":cat==="Farrier"?"amber":cat==="Feed"?"green":"blue";
          return (
            <div key={cat} style={{marginBottom:8}}>
              <div className="card" style={{cursor:"pointer",marginBottom:0}} onClick={()=>setExpandedCat(open?null:cat)}>
                <div className="card-top" style={{marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span className={`badge badge-${badgeColor}`}>{cat}</span>
                    <span style={{fontSize:12,color:T.slateLight}}>{items.length} item{items.length!==1?"s":""}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.red,fontWeight:600}}>{fmt(catTotal)}</div>
                    <span style={{fontSize:14,color:T.slateLight}}>{open?"▲":"▼"}</span>
                  </div>
                </div>
              </div>
              {open&&(
                <div style={{border:`1px solid ${T.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:T.offWhite,padding:"8px 12px"}}>
                  {items.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>(
                    <div key={e.id} style={{padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
                      {editingId===e.id ? (
                        <div>
                          <div className="grid2">
                            <div className="fg"><label className="fl">Date</label><input type="date" className="fc" value={editF.date} onChange={ev=>setEditF(x=>({...x,date:ev.target.value}))}/></div>
                            <div className="fg"><label className="fl">Amount (₪)</label><input type="number" className="fc" value={editF.amount} onChange={ev=>setEditF(x=>({...x,amount:ev.target.value}))}/></div>
                          </div>
                          <div className="fg"><label className="fl">Description</label><input className="fc" value={editF.desc} onChange={ev=>setEditF(x=>({...x,desc:ev.target.value}))}/></div>
                          <div className="fg"><label className="fl">Horse</label>
                            <select className="fc" value={editF.horse||""} onChange={ev=>setEditF(x=>({...x,horse:ev.target.value}))}>
                              <option value="">None</option>
                              {(data.horses||[]).map(h=><option key={h.id} value={h.name}>{h.name}</option>)}
                            </select>
                          </div>
                          <div className="fg"><label className="fl">Note</label><input className="fc" value={editF.note||""} onChange={ev=>setEditF(x=>({...x,note:ev.target.value}))}/></div>
                          <div style={{display:"flex",gap:8,marginTop:6}}>
                            <button className="btn btn-outline" style={{flex:1,fontSize:12}} onClick={()=>setEditingId(null)}>Cancel</button>
                            <button className="btn btn-primary" style={{flex:1,fontSize:12}} onClick={()=>saveEdit(e.id)}>Save</button>
                          </div>
                        </div>
                      ) : (
                        <div>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,fontWeight:600,color:T.navy,display:"flex",alignItems:"center",gap:6}}>
                                {e.desc}
                                {e.recurrenceGroup&&<span style={{fontSize:10,background:T.skyTint,color:T.blue,borderRadius:4,padding:"1px 6px"}}>🔁 Recurring</span>}
                              </div>
                              <div style={{fontSize:11,color:T.slateLight}}>{fmtD(e.date)}{e.horse?` · ${e.horse}`:""}</div>
                              {e.note&&<div style={{fontSize:11,color:T.slate,marginTop:2}}>{e.note}</div>}
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,color:T.red,fontWeight:600}}>{fmt(e.amount)}</div>
                              <button onClick={()=>{setEditingId(e.id);setEditF({...e,amount:String(e.amount)});}} style={{background:T.offWhite,border:`1px solid ${T.border}`,borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",color:T.navy}}>Edit</button>
                              <button onClick={()=>deleteExp(e.id)} style={{background:"none",border:"none",color:T.red,fontSize:16,cursor:"pointer",padding:"0 2px"}}>×</button>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  /* -- Modal dispatcher ----------------------------------------------------- */
  /* ── FileBox: reusable file upload/display component ── */
  function ModalSheet() {
    if (!modal) return null;
    const {type,payload:p} = modal;

    /* -- Add Schedule Event -- */
    if (type==="addScheduleEvent") {
      const prefill = p||{};
      const activeContacts = (data.contacts||[]).filter(c=>c.status==="active");
      const instructors    = activeContacts.filter(c=>c.roles?.some(r=>["Instructor","Coach"].includes(r)));
      const defaultRate    = (key) => data.serviceRates?.[key] ?? SERVICE_TYPES.find(s=>s.key===key)?.defaultRate ?? 0;
      const [f,setF]=useState({
        contactIds: prefill.contactId ? [prefill.contactId] : [],
        horseIds:[], date:TODAY, endDate:"", multiDay:false, time:"09:00", duration:"60",
        eventType:"Rider Lesson", serviceKey:"rider-lesson",
        price:String(defaultRate("rider-lesson")),
        instructor: instructors[0]?.name||"Coach Williams",
        recurrence:"None", status:"scheduled",
        isExternal:false, externalLocation:"",
        trailerBooked:false, transporterId:null, departureTime:"",
        perContact:false, contactPrices:{},
        // vet-session fields
        vetName:"", vetTreatment:"", vetType:"Vet Visit", vetExpiryDate:"", vetCost:"",
      });
      const svc = SERVICE_TYPES.find(s=>s.key===f.serviceKey);
      const toggleContact = id => setF(x=>({...x,contactIds:x.contactIds.includes(id)?x.contactIds.filter(i=>i!==id):[...x.contactIds,id]}));
      const toggleHorse   = id => setF(x=>({...x,horseIds:x.horseIds.includes(id)?x.horseIds.filter(i=>i!==id):[...x.horseIds,id]}));
      const save=()=>{
        const base={...f,
          duration: f.multiDay ? (f.endDate&&f.endDate>f.date ? Math.round((new Date(f.endDate)-new Date(f.date))/(1000*60*60*24))*24*60 : 0) : +f.duration,
          endDate: f.multiDay ? f.endDate : "",
          price:f.perContact ? f.contactIds.reduce((s,id)=>s+(+(f.contactPrices[id]??f.price)||0),0) : +f.price,
          contactPrices: f.perContact ? Object.fromEntries(Object.entries(f.contactPrices).map(([k,v])=>[k,+v||0])) : {},
          cancellationReason:"",cancellationPolicy:"",sessionNotes:"",attachments:[],
          trailerBooked:f.trailerBooked,transporterId:f.transporterId,departureTime:f.departureTime};
        const addDays=(dateStr,n)=>{const d=new Date(dateStr+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];};
        const addMonths=(dateStr,n)=>{const d=new Date(dateStr+"T12:00:00");d.setMonth(d.getMonth()+n);return d.toISOString().split("T")[0];};

        let occurrences=[];
        if(f.recurrence==="None"){
          occurrences=[{...base,id:Date.now()}];
        } else {
          // Generate 12 weeks / occurrences of recurring events
          const count = f.recurrence==="Daily"?14 : f.recurrence==="Monthly"?12 : 12;
          const step  = f.recurrence==="Daily"?1 : f.recurrence==="Weekly"?7 : f.recurrence==="Bi-weekly"?14 : 0;
          let cur=f.date;
          for(let i=0;i<count;i++){
            occurrences.push({...base,id:Date.now()+i,date:cur,status:"scheduled"});
            cur = f.recurrence==="Monthly" ? addMonths(cur,1) : addDays(cur,step);
          }
        }
        upd("scheduleEvents",[...(data.scheduleEvents||[]),...occurrences]);

        // Vet Session: auto-add medical record to each horse + log as expense
        if(f.eventType==="Vet Session"&&f.horseIds.length>0) {
          const newRecord = {
            id: Date.now(),
            date: f.date,
            type: f.vetType||"Vet Visit",
            name: f.vetTreatment||"Vet Visit",
            vet:  f.vetName||"",
            expiryDate: f.vetExpiryDate||"",
            notes: `Scheduled via calendar${f.vetName?" by "+f.vetName:""}`,
            files:[],
          };
          upd("horses",(data.horses||[]).map(h=>
            f.horseIds.includes(h.id)
              ? {...h, medicalRecords:[...(h.medicalRecords||[]),{...newRecord,id:Date.now()+h.id}]}
              : h
          ));
          if(+f.vetCost>0) {
            const horseNames = f.horseIds.map(id=>(data.horses||[]).find(h=>h.id===id)?.name).filter(Boolean).join(", ");
            upd("expenses",[...(data.expenses||[]),{
              id: Date.now()+999,
              date: f.date,
              desc: `${f.vetType||"Vet Visit"}${f.vetTreatment?" — "+f.vetTreatment:""}`,
              category: "Vet",
              amount: +f.vetCost,
              horse: horseNames,
              note: f.vetName?`By ${f.vetName}`:"",
            }]);
          }
        }

        close();
      };
      return (
        <div className="overlay" onClick={close}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-title">New Schedule Event</div>

            {/* Event type + service */}
            <div className="grid2">
              <div className="fg"><label className="fl">Event Type</label>
                <select className="fc" value={f.eventType} onChange={e=>{
                  const t=e.target.value;
                  setF(x=>({...x,eventType:t,...(t==="Vet Session"?{serviceKey:"vet-session",price:"0"}:{})}));
                }}>
                  {SCHEDULE_EVENT_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="fg"><label className="fl">Service Tag</label>
                <select className="fc" value={f.serviceKey} onChange={e=>{
                  const rate=defaultRate(e.target.value);
                  setF(x=>({...x,serviceKey:e.target.value,price:String(rate)}));
                }}>
                  {SERVICE_TYPES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
              </div>
            </div>
            {svc&&<div style={{fontSize:11,color:T.slateLight,marginBottom:10}}>Default rate: {fmt(data.serviceRates?.[f.serviceKey]||svc.defaultRate)}{svc.fixed?" (fixed monthly)":""}</div>}

            {/* Date / time / duration */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"10px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:T.offWhite,cursor:"pointer"}} onClick={()=>setF(x=>({...x,multiDay:!x.multiDay,endDate:x.multiDay?"":x.date}))}>
              <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${f.multiDay?T.blue:T.border}`,background:f.multiDay?T.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {f.multiDay&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
              </div>
              <div style={{fontSize:13,color:f.multiDay?T.navy:T.slateLight,fontWeight:f.multiDay?600:400}}>Multi-day event (start & end date)</div>
            </div>
            {!f.multiDay ? (
              <div className="fg"><label className="fl">Date</label><input type="date" className="fc" value={f.date} onChange={e=>setF(x=>({...x,date:e.target.value}))}/></div>
            ) : (
              <div className="grid2">
                <div className="fg"><label className="fl">Start Date</label><input type="date" className="fc" value={f.date} onChange={e=>setF(x=>({...x,date:e.target.value}))}/></div>
                <div className="fg"><label className="fl">End Date</label><input type="date" className="fc" value={f.endDate} onChange={e=>setF(x=>({...x,endDate:e.target.value}))}/></div>
              </div>
            )}
            {!f.multiDay&&(
              <div className="grid2">
                <div className="fg"><label className="fl">Time</label><input type="time" className="fc" value={f.time} onChange={e=>setF(x=>({...x,time:e.target.value}))}/></div>
                <div className="fg"><label className="fl">Duration (min)</label>
                  <select className="fc" value={f.duration} onChange={e=>setF(x=>({...x,duration:e.target.value}))}>
                    {["15","30","45","60","90","120"].map(d=><option key={d} value={d}>{d} min</option>)}
                  </select>
                </div>
              </div>
            )}
            {f.multiDay&&f.date&&f.endDate&&f.endDate>f.date&&(
              <div style={{fontSize:11,color:T.blue,marginBottom:8}}>
                {Math.round((new Date(f.endDate)-new Date(f.date))/(1000*60*60*24))+1} day{Math.round((new Date(f.endDate)-new Date(f.date))/(1000*60*60*24))>0?"s":""}
              </div>
            )}

            {/* Recurrence */}
            <div className="fg"><label className="fl">Recurrence</label>
              <select className="fc" value={f.recurrence} onChange={e=>setF(x=>({...x,recurrence:e.target.value}))}>
                {RECURRENCE_OPTIONS.map(r=><option key={r}>{r}</option>)}
              </select>
              {f.recurrence!=="None"&&(
                <div style={{fontSize:11,color:T.blue,marginTop:4}}>
                  Creates {f.recurrence==="Daily"?"14 daily":f.recurrence==="Weekly"?"12 weekly":f.recurrence==="Bi-weekly"?"12 bi-weekly":"12 monthly"} sessions from the chosen date
                </div>
              )}
            </div>

            {/* Vet Session specific fields */}
            {f.eventType==="Vet Session"&&(
              <div style={{background:"#FEF2F2",borderRadius:10,padding:14,border:`1.5px solid ${T.red}`,marginBottom:4}}>
                <div className="sub-head" style={{marginBottom:10,color:T.red}}>🩺 Vet Session Details</div>
                <div className="alert" style={{background:"#FEE2E2",color:"#991B1B",fontSize:11,marginBottom:10}}>
                  This will be logged as an expense and added to each selected horse's medical record.
                </div>
                <div className="fg"><label className="fl">Vet / Professional</label>
                  <select className="fc" value={f.vetName} onChange={e=>setF(x=>({...x,vetName:e.target.value}))}>
                    <option value="">-- Select contact --</option>
                    {(()=>{
                      const active = (data.contacts||[]).filter(c=>c.status==="active");
                      const vets   = active.filter(c=>c.roles?.includes("Vet"));
                      const others = active.filter(c=>!c.roles?.includes("Vet"));
                      return [
                        vets.length>0&&<optgroup key="vets" label="── Vets ──">
                          {vets.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                        </optgroup>,
                        others.length>0&&<optgroup key="others" label="── Other Contacts ──">
                          {others.map(c=><option key={c.id} value={c.name}>{c.name}{c.roles?.length?" · "+c.roles.join(", "):""}</option>)}
                        </optgroup>,
                      ];
                    })()}
                  </select>
                </div>
                <div className="grid2">
                  <div className="fg"><label className="fl">Treatment Type</label>
                    <select className="fc" value={f.vetType} onChange={e=>setF(x=>({...x,vetType:e.target.value}))}>
                      {["Vet Visit","Vaccination","Dental","Worming","X-Ray","Farrier","Other"].map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="fg"><label className="fl">Expiry / Next Due</label>
                    <input type="date" className="fc" value={f.vetExpiryDate} onChange={e=>setF(x=>({...x,vetExpiryDate:e.target.value}))}/>
                  </div>
                </div>
                <div className="fg"><label className="fl">Treatment Name / Notes</label>
                  <input className="fc" placeholder="e.g. Flu/Rhino Vaccine" value={f.vetTreatment} onChange={e=>setF(x=>({...x,vetTreatment:e.target.value}))}/>
                </div>
                <div className="fg"><label className="fl">Cost (₪) — Expense</label>
                  <input type="number" className="fc" placeholder="0" value={f.vetCost} onChange={e=>setF(x=>({...x,vetCost:e.target.value}))}/>
                </div>
              </div>
            )}
            <div style={{borderRadius:10,border:`1.5px solid ${f.isExternal?T.amber:T.border}`,padding:"10px 14px",marginBottom:12,background:f.isExternal?T.amberBg:T.white,transition:"all .2s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <input type="checkbox" id="ext" checked={f.isExternal} onChange={e=>setF(x=>({...x,isExternal:e.target.checked,trailerBooked:false,transporterId:null,departureTime:""}))} style={{width:16,height:16,cursor:"pointer"}}/>
                <label htmlFor="ext" style={{fontSize:13,cursor:"pointer",fontWeight:600,color:f.isExternal?T.amber:T.navy}}>🚛 External Stable Activity</label>
              </div>
              {f.isExternal&&(
                <div style={{marginTop:12}}>
                  <div className="fg"><label className="fl">External Location</label><input className="fc" placeholder="Stable name / address" value={f.externalLocation} onChange={e=>setF(x=>({...x,externalLocation:e.target.value}))}/></div>
                  <div className="div"/>
                  <div className="sub-head" style={{marginBottom:8}}>🚐 Transportation</div>
                  <div className="fg"><label className="fl">Transporter</label>
                    <select className="fc" value={f.transporterId||""} onChange={e=>setF(x=>({...x,transporterId:e.target.value?+e.target.value:null}))}>
                      <option value="">-- Select transporter --</option>
                      {(data.contacts||[]).filter(c=>c.roles?.includes("Transporter")).map(c=>(
                        <option key={c.id} value={c.id}>{c.name}</option>
                      ))}
                    </select>
                  </div>
                  <div className="fg"><label className="fl">Departure Time</label>
                    <input type="time" className="fc" value={f.departureTime} onChange={e=>setF(x=>({...x,departureTime:e.target.value}))}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8,padding:"10px 12px",borderRadius:8,border:`1.5px solid ${f.trailerBooked?T.green:T.red}`,background:f.trailerBooked?"#F0FDF4":"#FFF5F5",cursor:"pointer"}} onClick={()=>setF(x=>({...x,trailerBooked:!x.trailerBooked}))}>
                    <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${f.trailerBooked?T.green:T.red}`,background:f.trailerBooked?T.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {f.trailerBooked&&<span style={{color:"#fff",fontSize:13,lineHeight:1}}>✓</span>}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:f.trailerBooked?T.green:T.red}}>Trailer {f.trailerBooked?"Booked ✓":"Not Booked ⚠"}</div>
                      {!f.trailerBooked&&<div style={{fontSize:11,color:T.red}}>Tap to mark trailer as booked</div>}
                    </div>
                  </div>
                  {!f.trailerBooked&&<div className="alert" style={{background:"#FEF3C7",color:"#92400E",border:"1px solid #FDE68A",fontSize:12,marginTop:8}}>⚠ Remember to book transportation before this session.</div>}
                </div>
              )}
            </div>

            {/* Contacts */}
            <div className="div"/>
            <div className="sub-head">Contacts ({f.contactIds.length} selected)</div>
            <div style={{maxHeight:160,overflowY:"auto",marginBottom:10}}>
              {activeContacts.map(c=>{
                const sel=f.contactIds.includes(c.id);
                return (
                  <div key={c.id} onClick={()=>toggleContact(c.id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",borderRadius:8,marginBottom:6,cursor:"pointer",border:`1.5px solid ${sel?T.blue:T.border}`,background:sel?T.skyTint:T.white}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:c.color||T.blue}}/>
                      <div style={{fontSize:13,fontWeight:sel?600:400,color:sel?T.blue:T.navy}}>{c.name}</div>
                    </div>
                    <div style={{fontSize:11,color:T.slateLight}}>{(c.roles||[]).join(", ")}</div>
                  </div>
                );
              })}
            </div>

            {/* Horses */}
            <div className="sub-head">Horses ({f.horseIds.length} selected)</div>
            <div style={{maxHeight:130,overflowY:"auto",marginBottom:10}}>
              {(data.horses||[]).map(h=>{
                const sel=f.horseIds.includes(h.id);
                return (
                  <div key={h.id} onClick={()=>toggleHorse(h.id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderRadius:8,marginBottom:5,cursor:"pointer",border:`1.5px solid ${sel?T.teal:T.border}`,background:sel?T.tealBg:T.white}}>
                    <div style={{fontSize:13,fontWeight:sel?600:400,color:sel?T.teal:T.navy}}>🐴 {h.name}</div>
                    <div style={{fontSize:11,color:T.slateLight}}>{h.housing==="pasture"?"🌿 Pasture":h.housing==="hybrid"?"🔄 Hybrid":"🏠 Stall"} · {h.color}</div>
                  </div>
                );
              })}
            </div>

            {/* Fee + instructor */}
            <div className="fg">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <label className="fl" style={{margin:0}}>Fee (₪)</label>
                {f.contactIds.length>1&&(
                  <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>setF(x=>({...x,perContact:!x.perContact,contactPrices:Object.fromEntries(x.contactIds.map(id=>[id,x.price]))}))}>
                    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${f.perContact?T.blue:T.border}`,background:f.perContact?T.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {f.perContact&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:11,color:f.perContact?T.blue:T.slateLight}}>Per contact</span>
                  </div>
                )}
              </div>
              {!f.perContact ? (
                <input type="number" className="fc" value={f.price} onChange={e=>setF(x=>({...x,price:e.target.value}))}/>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {f.contactIds.map(id=>{
                    const c=(data.contacts||[]).find(x=>x.id===id);
                    if(!c) return null;
                    return (
                      <div key={id} style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:c.color||T.blue,flexShrink:0}}/>
                        <span style={{fontSize:13,flex:1,color:T.navy}}>{c.name}</span>
                        <input type="number" className="fc" style={{width:90}}
                          value={f.contactPrices[id]??f.price}
                          onChange={e=>setF(x=>({...x,contactPrices:{...x.contactPrices,[id]:e.target.value}}))}/>
                        <span style={{fontSize:11,color:T.slateLight}}>₪</span>
                      </div>
                    );
                  })}
                  <div style={{fontSize:12,color:T.blue,fontWeight:600,marginTop:2}}>
                    Total: {fmt(f.contactIds.reduce((s,id)=>s+(+(f.contactPrices[id]??f.price)||0),0))}
                  </div>
                </div>
              )}
            </div>
            <div className="grid2" style={{marginTop:4}}>
              <div/>
              <div className="fg"><label className="fl">Instructor</label>
                <select className="fc" value={f.instructor} onChange={e=>setF(x=>({...x,instructor:e.target.value}))}>
                  {instructors.map(c=><option key={c.id}>{c.name}</option>)}
                  <option>Other</option>
                </select>
              </div>
            </div>

            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={close}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={save}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    /* -- Add Horse -- */
    if (type==="addHorse") {
      const [f,setF]=useState({name:"",breed:"",age:"",color:"",type:"in-house",ownerId:"",housing:"stall",chipNumber:"",suitedFor:["Sport"],notes:""});
      const save=()=>{
        if(!f.name) return;
        upd("horses",[...(data.horses||[]),{
          ...f,id:Date.now(),age:+f.age||0,ownerId:f.ownerId?+f.ownerId:null,
          weeklyLessons:0,maxWeekly:5,medicalRecords:[],accomplishments:[],
        }]);
        close();
      };
      return (
        <div className="overlay" onClick={close}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-title">Add Horse</div>
            <div className="fg"><label className="fl">Name</label><input className="fc" placeholder="Horse name" value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))}/></div>
            <div className="grid2">
              <div className="fg"><label className="fl">Breed</label><input className="fc" placeholder="e.g. Warmblood" value={f.breed} onChange={e=>setF(x=>({...x,breed:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Color</label><input className="fc" placeholder="e.g. Bay" value={f.color} onChange={e=>setF(x=>({...x,color:e.target.value}))}/></div>
            </div>
            <div className="grid2">
              <div className="fg"><label className="fl">Age (yrs)</label><input type="number" className="fc" value={f.age} onChange={e=>setF(x=>({...x,age:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Housing</label>
                <select className="fc" value={f.housing} onChange={e=>setF(x=>({...x,housing:e.target.value}))}>
                  <option value="stall">Stall</option><option value="pasture">Pasture</option><option value="hybrid">Hybrid</option>
                </select>
              </div>
            </div>
            <div className="fg"><label className="fl">Microchip Number</label><input className="fc" placeholder="Optional" value={f.chipNumber} onChange={e=>setF(x=>({...x,chipNumber:e.target.value}))}/></div>
            <div className="fg"><label className="fl">Type</label>
              <select className="fc" value={f.type} onChange={e=>setF(x=>({...x,type:e.target.value}))}>
                <option value="in-house">In-House</option><option value="client">Client-Owned</option>
              </select>
            </div>
            {f.type==="client"&&(
              <div className="fg"><label className="fl">Owner</label>
                <select className="fc" value={f.ownerId} onChange={e=>setF(x=>({...x,ownerId:e.target.value}))}>
                  <option value="">None</option>
                  {(data.contacts||[]).filter(c=>c.status==="active").map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
            )}
            <div className="fg">
              <label className="fl">Suited For</label>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                {["Sport","Therapeutic"].map(s=>{
                  const on=f.suitedFor.includes(s);
                  return <button key={s} className={`chip${on?" on":""}`} onClick={()=>setF(x=>({...x,suitedFor:on?x.suitedFor.filter(i=>i!==s):[...x.suitedFor,s]}))}>{s}</button>;
                })}
              </div>
            </div>
            <div className="fg"><label className="fl">Notes</label><textarea className="fc" rows={2} value={f.notes} onChange={e=>setF(x=>({...x,notes:e.target.value}))}/></div>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={close}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={save}>Add Horse</button>
            </div>
          </div>
        </div>
      );
    }

    /* -- Add Contact -- */
    if (type==="addContact") {
      const [f,setF]=useState({name:"",email:"",phone:"",gender:"Female",dob:"",hometown:"",roles:["Rider"],color:"#6B9FE0",status:"active",parent1Name:"",parent1Phone:"",parent2Name:"",parent2Phone:"",notes:""});
      const toggleRole = r => setF(x=>({...x,roles:x.roles.includes(r)?x.roles.filter(i=>i!==r):[...x.roles,r]}));
      const save=()=>{
        if(!f.name) return;
        upd("contacts",[...(data.contacts||[]),{...f,id:Date.now(),accomplishments:[]}]);
        close();
      };
      return (
        <div className="overlay" onClick={close}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-title">New Contact</div>
            <div className="fg"><label className="fl">Full Name</label><input className="fc" value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))}/></div>
            <div className="grid2">
              <div className="fg"><label className="fl">Gender</label>
                <select className="fc" value={f.gender} onChange={e=>setF(x=>({...x,gender:e.target.value}))}>
                  <option>Female</option><option>Male</option><option>Other</option>
                </select>
              </div>
              <div className="fg"><label className="fl">Date of Birth</label><input type="date" className="fc" value={f.dob} onChange={e=>setF(x=>({...x,dob:e.target.value}))}/></div>
            </div>
            <div className="grid2">
              <div className="fg"><label className="fl">Phone</label><input className="fc" type="tel" value={f.phone} onChange={e=>setF(x=>({...x,phone:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Email</label><input className="fc" type="email" value={f.email} onChange={e=>setF(x=>({...x,email:e.target.value}))}/></div>
            </div>
            <div className="fg"><label className="fl">Hometown</label><input className="fc" value={f.hometown} onChange={e=>setF(x=>({...x,hometown:e.target.value}))}/></div>
            <div className="fg"><label className="fl">Roles (select all that apply)</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
                {ALL_ROLES.map(r=>{const on=f.roles.includes(r);return(<button key={r} className={`chip${on?" on":""}`} style={{fontSize:11}} onClick={()=>toggleRole(r)}>{r}</button>);})}
              </div>
            </div>
            <div className="grid2">
              <div className="fg"><label className="fl">Parent/Guardian 1 Name</label><input className="fc" value={f.parent1Name} onChange={e=>setF(x=>({...x,parent1Name:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Parent/Guardian 1 Phone</label><input className="fc" value={f.parent1Phone} onChange={e=>setF(x=>({...x,parent1Phone:e.target.value}))}/></div>
            </div>
            <div className="grid2">
              <div className="fg"><label className="fl">Parent/Guardian 2 Name</label><input className="fc" value={f.parent2Name} onChange={e=>setF(x=>({...x,parent2Name:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Parent/Guardian 2 Phone</label><input className="fc" value={f.parent2Phone} onChange={e=>setF(x=>({...x,parent2Phone:e.target.value}))}/></div>
            </div>
            <div className="fg"><label className="fl">Calendar Colour</label>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <input type="color" value={f.color} onChange={e=>setF(x=>({...x,color:e.target.value}))} style={{width:40,height:36,borderRadius:6,border:"none",cursor:"pointer"}}/>
                <div style={{flex:1,height:36,borderRadius:8,background:f.color,display:"flex",alignItems:"center",paddingLeft:12}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{f.name||"Contact"}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                {["#E06B6B","#E0836B","#E0B96B","#C9D44A","#8ECC6E","#4DAF7C",
                  "#6BE0C9","#6B9FE0","#7B7BE0","#C97DE0","#E06BAA","#B0B8D4",
                  "#C47A3A","#4A9E8E","#2D6FA3","#7B4EA0","#C0392B","#1A7A4A",
                  "#B45309","#64748B"].map(hex=>(
                  <div key={hex} onClick={()=>setF(x=>({...x,color:hex}))} style={{width:26,height:26,borderRadius:"50%",background:hex,cursor:"pointer",border:f.color===hex?`3px solid ${T.navy}`:"3px solid transparent",transition:"border .12s"}}/>
                ))}
              </div>
            </div>
            <div className="fg"><label className="fl">Notes</label><textarea className="fc" rows={2} value={f.notes} onChange={e=>setF(x=>({...x,notes:e.target.value}))}/></div>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={close}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={save}>Add Contact</button>
            </div>
          </div>
        </div>
      );
    }

    /* -- Add Competition / Clinic -- */
    if (type==="addEvent") {
      const isComp = p.kind==="competition";
      const activeContacts = (data.contacts||[]).filter(c=>c.status==="active");
      const [f, setF] = useState({
        name:"", date:TODAY, endDate:"", location:"", fee:"",
        status:"upcoming", contactIds:[],
        clinician:"", duration:"Full Day", price:"", spotsTotal:"6",
        perContact:false, contactPrices:{},
      });

      const toggleContact = (id) =>
        setF(x=>({...x, contactIds: x.contactIds.includes(id)
          ? x.contactIds.filter(i=>i!==id)
          : [...x.contactIds, id]}));

      const save = () => {
        if (!f.name || !f.date) return;
        if (isComp) {
          const newComp = {
            id:Date.now(), name:f.name, date:f.date, endDate:f.endDate||f.date, location:f.location,
            fee:+f.fee||0, contactIds:f.contactIds, status:"upcoming",
            contactPrices:f.perContact?Object.fromEntries(Object.entries(f.contactPrices).map(([k,v])=>[k,+v||0])):{},
            trailerBooked:false, transporterId:null,
            riderChecks:Object.fromEntries(f.contactIds.map(id=>[id,{paymentSent:false,horseId:null}])),
            horseChecks:{},
          };
          upd("competitions",[...(data.competitions||[]),newComp]);
        } else {
          const newClinic = {
            id:Date.now(), name:f.name, date:f.date, endDate:f.endDate||f.date, clinician:f.clinician,
            duration:f.duration, price:+f.price||0, spotsTotal:+f.spotsTotal||6,
            contactIds:f.contactIds, status:"upcoming",
            contactPrices:f.perContact?Object.fromEntries(Object.entries(f.contactPrices).map(([k,v])=>[k,+v||0])):{},
          };
          upd("clinics",[...(data.clinics||[]),newClinic]);
        }
        close();
      };

      return (
        <div className="overlay" onClick={close}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-title">{isComp?"New Competition":"New Clinic"}</div>

            <div className="fg"><label className="fl">Name</label>
              <input className="fc" placeholder={isComp?"e.g. Spring Classic Show":"e.g. Jumping Clinic with D. Hayden"} value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))}/>
            </div>
            <div className="grid2">
              <div className="fg"><label className="fl">Start Date</label>
                <input type="date" className="fc" value={f.date} onChange={e=>setF(x=>({...x,date:e.target.value}))}/>
              </div>
              <div className="fg"><label className="fl">End Date</label>
                <input type="date" className="fc" value={f.endDate} onChange={e=>setF(x=>({...x,endDate:e.target.value}))}/>
              </div>
            </div>
            {f.date&&f.endDate&&f.endDate>=f.date&&(
              <div style={{fontSize:11,color:T.blue,marginBottom:8}}>

                </div>
                {!f.perContact

                      <div style={{fontSize:12,color:T.blue,fontWeight:600}}>Total: {fmt(f.contactIds.reduce((s,id)=>s+(+(f.contactPrices[id]??f.fee)||0),0))}</div>

              </div>
            </>) : (<>
              <div className="fg"><label className="fl">Clinician</label>
                <input className="fc" placeholder="Clinician name" value={f.clinician} onChange={e=>setF(x=>({...x,clinician:e.target.value}))}/>
              </div>
              <div className="grid2">
                <div className="fg"><label className="fl">Duration</label>
                  <select className="fc" value={f.duration} onChange={e=>setF(x=>({...x,duration:e.target.value}))}>
                    <option>Half Day</option><option>Full Day</option><option>Weekend</option><option>Other</option>
                  </select>
                </div>
                <div className="fg"><label className="fl">Total Spots</label>
                  <input type="number" className="fc" value={f.spotsTotal} onChange={e=>setF(x=>({...x,spotsTotal:e.target.value}))}/>
                </div>
              </div>
              <div className="fg">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <label className="fl" style={{margin:0}}>Price per Rider (₪)</label>
                  {f.contactIds.length>1&&<div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>setF(x=>({...x,perContact:!x.perContact,contactPrices:Object.fromEntries(x.contactIds.map(id=>[id,x.price]))}))}>
                    <div style={{width:16,height:16,borderRadius:3,border:`2px solid ${f.perContact?T.blue:T.border}`,background:f.perContact?T.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {f.perContact&&<span style={{color:"#fff",fontSize:9,fontWeight:700}}>✓</span>}
                    </div>
                    <span style={{fontSize:11,color:f.perContact?T.blue:T.slateLight}}>Per contact</span>
                  </div>}
                </div>
                {!f.perContact
                  ? <input type="number" className="fc" placeholder="0" value={f.price} onChange={e=>setF(x=>({...x,price:e.target.value}))}/>
                  : <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {f.contactIds.map(id=>{const c=activeContacts.find(x=>x.id===id);return c?(<div key={id} style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:c.color||T.blue}}/><span style={{fontSize:13,flex:1}}>{c.name}</span><input type="number" className="fc" style={{width:90}} value={f.contactPrices[id]??f.price} onChange={e=>setF(x=>({...x,contactPrices:{...x.contactPrices,[id]:e.target.value}}))}/><span style={{fontSize:11,color:T.slateLight}}>₪</span></div>):null;})}
                      <div style={{fontSize:12,color:T.blue,fontWeight:600}}>Total: {fmt(f.contactIds.reduce((s,id)=>s+(+(f.contactPrices[id]??f.price)||0),0))}</div>
                    </div>
                }
              </div>
            </>)}

            <div className="div"/>
            <div className="sub-head">Enroll Riders {f.contactIds.length>0&&`(${f.contactIds.length} selected)`}</div>
            <div style={{fontSize:12,color:T.slateLight,marginBottom:10}}>Select riders to enroll now -- you can add or remove them later.</div>
            <div style={{maxHeight:200,overflowY:"auto"}}>
              {activeContacts.filter(c=>c.roles?.includes("Rider")).map(c=>{
                const sel = f.contactIds.includes(c.id);
                const atLimit = !isComp && +f.spotsTotal>0 && f.contactIds.length>=+f.spotsTotal && !sel;
                return (
                  <div key={c.id} onClick={()=>!atLimit&&toggleContact(c.id)} style={{
                    display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"9px 12px",borderRadius:8,marginBottom:6,cursor:atLimit?"not-allowed":"pointer",
                    border:`1.5px solid ${sel?T.blue:T.border}`,
                    background:sel?T.skyTint:T.white,opacity:atLimit?0.4:1,transition:"all .15s",
                  }}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:c.color||T.blue}}/>
                      <div style={{fontSize:14,fontWeight:sel?600:400,color:sel?T.blue:T.navy}}>{c.name}</div>
                    </div>
                    <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${sel?T.blue:T.border}`,background:sel?T.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {sel&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={close}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={save}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    /* -- Detail sheets -- */
    let body=null;


    if (type==="horseDetail") {
      const live = data.horses.find(h=>h.id===p.id)||p;
      const pct  = Math.round(live.weeklyLessons/live.maxWeekly*100);
      const lvl  = wlLvl(live);
      const [sec, setSec] = useState("overview");
      const [showAddMed, setShowAddMed] = useState(false);
      const [showAddAcc, setShowAddAcc] = useState(false);
      const [accText, setAccText] = useState("");
      const [mf, setMf] = useState({date:TODAY,type:"Vaccination",name:"",vet:"",notes:"",expiryDate:""});
      const [ef, setEf] = useState({
        name:live.name,breed:live.breed,age:String(live.age),color:live.color,
        type:live.type,ownerId:String(live.ownerId||""),maxWeekly:String(live.maxWeekly),
        housing:live.housing||"stall",chipNumber:live.chipNumber||"",notes:live.notes||"",
        suitedFor:[...(live.suitedFor||[])],
      });

      const patchHorse = (patch) => upd("horses",data.horses.map(h=>h.id===live.id?{...h,...patch}:h));
      const saveEdit   = () => { patchHorse({...ef,age:+ef.age,maxWeekly:+ef.maxWeekly,ownerId:ef.ownerId?+ef.ownerId:null}); setSec("overview"); };
      const toggleHousing = () => { const cycle={"stall":"pasture","pasture":"hybrid","hybrid":"stall"}; patchHorse({housing:cycle[live.housing]||"stall"}); };

      const addMedRecord = () => {
        if (!mf.notes&&!mf.name) return;
        patchHorse({medicalRecords:[...(live.medicalRecords||[]),{id:Date.now(),...mf,files:[]}]});
        setMf({date:TODAY,type:"Vaccination",name:"",vet:"",notes:"",expiryDate:""});
        setShowAddMed(false);
      };
      const updateMedRecord = (recId,patch) =>
        patchHorse({medicalRecords:(live.medicalRecords||[]).map(r=>r.id===recId?{...r,...patch}:r)});
      const deleteMedRecord = (recId) =>
        patchHorse({medicalRecords:(live.medicalRecords||[]).filter(r=>r.id!==recId)});
      const addAccomplishment = () => {
        if (!accText.trim()) return;
        patchHorse({accomplishments:[...(live.accomplishments||[]),accText.trim()]});
        setAccText(""); setShowAddAcc(false);
      };

      const MED_TYPES = ["Vaccination","Vet Visit","Farrier","Dental","Worming","X-Ray","Other"];
      const today = new Date(TODAY+"T12:00:00");
      const vaxAlerts = (live.medicalRecords||[]).filter(r=>{
        if (r.type!=="Vaccination"||!r.expiryDate) return false;
        const days = Math.ceil((new Date(r.expiryDate+"T12:00:00")-today)/(1000*60*60*24));
        return days<=30;
      });
      const ownerContact = live.ownerId ? (data.contacts||[]).find(c=>c.id===live.ownerId) : null;
      const housingIcon2 = live.housing==="pasture"?"🌿":live.housing==="hybrid"?"🔄":"🏠";
      const inPasture = live.housing==="pasture";
      const isHybrid = live.housing==="hybrid";

      body=(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div className="sheet-title" style={{marginBottom:4}}>{live.name}</div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              <span className={`badge badge-${live.type==="in-house"?"blue":"amber"}`}>{live.type==="in-house"?"In-House":"Client Owned"}</span>
              {live.suitedFor?.includes("Therapeutic")&&<span className="badge badge-teal">Therapy</span>}
            </div>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"10px 14px",borderRadius:10,background:inPasture?T.greenBg:isHybrid?"#F0FDF4":T.skyTint,border:`1px solid ${inPasture?T.green:isHybrid?T.teal:T.border}`}}>
            <span style={{fontSize:20}}>{housingIcon2}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{inPasture?"In Pasture":isHybrid?"Hybrid":"In Stall"}</div>
              <div style={{fontSize:11,color:T.slateLight}}>Tap to update location</div>
            </div>
            <button onClick={toggleHousing} style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer",color:T.navy}}>
              Move to {inPasture?"Stall":isHybrid?"Stall":"Pasture"}
            </button>
          </div>

          {vaxAlerts.length>0&&(
            <div className="alert alert-amber" style={{marginBottom:12}}>
              Vaccination alert: {vaxAlerts.map(r=>r.name||r.type).join(", ")} expiring or expired
            </div>
          )}

          <div className="chips" style={{marginBottom:14}}>
            {[["overview","Overview"],["medical","Medical ("+( live.medicalRecords?.length||0)+")"],["accomplish","Achievements"],["docs","Docs"+(live.attachments?.length?` (${live.attachments.length})`:""+"")],["edit","Edit"]].map(([v,l])=>(
              <button key={v} className={"chip"+(sec===v?" on":"")} onClick={()=>setSec(v)}>{l}</button>
            ))}
          </div>

          {sec==="overview"&&(
            <div>
              <div className="row"><span className="row-label">Breed</span><span className="row-value">{live.breed}</span></div>
              <div className="row"><span className="row-label">Color</span><span className="row-value">{live.color}</span></div>
              <div className="row"><span className="row-label">Age</span><span className="row-value">{live.age} yrs</span></div>
              {ownerContact&&<div className="row"><span className="row-label">Owner</span><span className="row-value">{ownerContact.name}</span></div>}
              <div className="row"><span className="row-label">Suited for</span><span className="row-value">{live.suitedFor?.join(", ")}</span></div>
              {live.chipNumber&&<div className="row"><span className="row-label">Chip No.</span><span className="row-value" style={{fontSize:12,fontFamily:"monospace"}}>{live.chipNumber}</span></div>}
              <div className="div"/>
              <div className="sub-head">Weekly Workload</div>
              <div className="wb-wrap" style={{marginTop:0}}>
                <div className="wb-meta"><span>{live.weeklyLessons} of {live.maxWeekly} lessons</span><span style={{fontWeight:600,color:lvl==="high"?T.red:lvl==="med"?T.amber:T.green}}>{pct}% capacity</span></div>
                <div className="wb-track"><div className={"wb-fill wb-"+lvl} style={{width:pct+"%"}}/></div>
              </div>
              {lvl==="high"&&<div className="alert alert-amber" style={{marginTop:8}}>Near maximum workload.</div>}
              {live.notes&&<><div className="div"/><div className="sub-head">Notes</div><div style={{fontSize:13,color:T.slate,fontStyle:"italic"}}>{live.notes}</div></>}
              <div className="div"/>
              <HorseIncidents horseId={live.id} data={data} upd={upd} setModal={setModal}/>
            </div>
          )}

          {sec==="medical"&&(
            <div>
              <button className="btn btn-primary btn-block" style={{marginBottom:14}} onClick={()=>setShowAddMed(x=>!x)}>
                {showAddMed?"Cancel":"+ Add Medical Record"}

              {showAddMed&&(
                <div style={{background:T.offWhite,borderRadius:10,padding:14,marginBottom:14,border:"1px solid "+T.border}}>
                  <div className="sub-head" style={{marginBottom:10}}>New Record</div>
                  <div className="grid2">
                    <div className="fg"><label className="fl">Date</label><input type="date" className="fc" value={mf.date} onChange={e=>setMf(x=>({...x,date:e.target.value}))}/></div>
                    <div className="fg"><label className="fl">Type</label>
                      <select className="fc" value={mf.type} onChange={e=>setMf(x=>({...x,type:e.target.value}))}>
                        {MED_TYPES.map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="fg"><label className="fl">Name / Description</label><input className="fc" placeholder="e.g. Flu/Rhino" value={mf.name} onChange={e=>setMf(x=>({...x,name:e.target.value}))}/></div>
                  <div className="fg"><label className="fl">Vet / Professional</label><input className="fc" value={mf.vet} onChange={e=>setMf(x=>({...x,vet:e.target.value}))}/></div>
                  {mf.type==="Vaccination"&&<div className="fg"><label className="fl">Expiry Date</label><input type="date" className="fc" value={mf.expiryDate} onChange={e=>setMf(x=>({...x,expiryDate:e.target.value}))}/></div>}
                  <div className="fg"><label className="fl">Notes</label><textarea className="fc" rows={2} value={mf.notes} onChange={e=>setMf(x=>({...x,notes:e.target.value}))}/></div>

                </div>
              )}
              {(live.medicalRecords||[]).length===0&&!showAddMed&&<div className="empty"><div className="empty-ico">🩺</div><div className="empty-txt">No medical records yet.</div></div>}
              {[...(live.medicalRecords||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
                const expiry = r.expiryDate ? new Date(r.expiryDate+"T12:00:00") : null;
                const daysLeft = expiry ? Math.ceil((expiry-today)/(1000*60*60*24)) : null;
                const expired = daysLeft!==null && daysLeft<0;
                const soonExp = daysLeft!==null && daysLeft>=0 && daysLeft<=30;
                return (
                  <div key={r.id} className="card" style={{cursor:"default",borderLeft:expired?"3px solid "+T.red:soonExp?"3px solid "+T.amber:undefined}}>
                    <div className="card-top" style={{marginBottom:6}}>
                      <div>
                        <div className="card-name" style={{fontSize:14}}>{r.name||r.type}</div>
                        <div className="card-sub">{fmtD(r.date)}{r.vet?" - "+r.vet:""}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                        <span className={"badge badge-"+(r.type==="Vaccination"?"green":r.type==="Vet Visit"?"blue":r.type==="Farrier"?"amber":"slate")}>{r.type}</span>
                        {expired&&<span className="badge badge-red">Expired</span>}
                        {soonExp&&!expired&&<span className="badge badge-amber">{daysLeft}d left</span>}
                      </div>
                    </div>
                    {r.notes&&<div style={{fontSize:13,color:T.slate,lineHeight:1.5,marginBottom:6}}>{r.notes}</div>}
                    {r.type==="Vaccination"&&(
                      <div className="fg" style={{marginBottom:6}}>
                        <label className="fl">Expiry Date</label>
                        <input type="date" className="fc" value={r.expiryDate||""} onChange={e=>updateMedRecord(r.id,{expiryDate:e.target.value})}/>
                      </div>
                    )}
                    <button onClick={()=>deleteMedRecord(r.id)} style={{background:"transparent",color:T.red,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",padding:0}}>Delete record</button>
                  </div>
                );
              })}
            </div>
          )}

          {sec==="accomplish"&&(
            <div>
              <button className="btn btn-primary btn-block" style={{marginBottom:14}} onClick={()=>setShowAddAcc(x=>!x)}>
                {showAddAcc?"Cancel":"+ Add Achievement"}
              </button>
              {showAddAcc&&(
                <div style={{background:T.offWhite,borderRadius:10,padding:14,marginBottom:14,border:"1px solid "+T.border}}>
                  <div className="fg"><label className="fl">Achievement</label>
                    <input className="fc" placeholder="e.g. 1st Place Show Jumping, June 2026" value={accText} onChange={e=>setAccText(e.target.value)}/>
                  </div>
                  <button className="btn btn-primary btn-block" onClick={addAccomplishment}>Save</button>
                </div>
              )}
              {(live.accomplishments||[]).length===0&&!showAddAcc&&<div className="empty"><div className="empty-ico">🏅</div><div className="empty-txt">No achievements recorded yet.</div></div>}
              {(live.accomplishments||[]).map((a,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,border:"1px solid "+T.border,marginBottom:8,background:T.offWhite}}>
                  <div style={{fontSize:13,color:T.navy}}>🏅 {a}</div>
                  <button onClick={()=>patchHorse({accomplishments:(live.accomplishments||[]).filter((_,j)=>j!==i)})} style={{background:"transparent",color:T.red,border:"none",fontSize:11,fontWeight:600,cursor:"pointer"}}>X</button>
                </div>
              ))}
              <div className="div"/>
              <FileBox
                attachments={live.attachments||[]}
                label="Medical Files & Reports"
                onAdd={att=>patchHorse({attachments:[...(live.attachments||[]),att]})}
                onRemove={id=>patchHorse({attachments:(live.attachments||[]).filter(a=>a.id!==id)})}
              />
            </div>
          )}

          {sec==="docs"&&(
            <div>
              <div className="alert alert-blue" style={{fontSize:12,marginBottom:12}}>
                Upload the horse's ID card, registration papers, insurance documents, or any other files.
              </div>
              <FileBox
                attachments={live.attachments||[]}
                label="Horse Documents"
                onAdd={att=>patchHorse({attachments:[...(live.attachments||[]),att]})}
                onRemove={id=>patchHorse({attachments:(live.attachments||[]).filter(a=>a.id!==id)})}
              />
            </div>
          )}

          {sec==="edit"&&(
            <div>
              <div className="fg"><label className="fl">Name</label><input className="fc" value={ef.name} onChange={e=>setEf(x=>({...x,name:e.target.value}))}/></div>
              <div className="grid2">
                <div className="fg"><label className="fl">Breed</label><input className="fc" value={ef.breed} onChange={e=>setEf(x=>({...x,breed:e.target.value}))}/></div>
                <div className="fg"><label className="fl">Color</label><input className="fc" value={ef.color} onChange={e=>setEf(x=>({...x,color:e.target.value}))}/></div>
              </div>
              <div className="grid2">
                <div className="fg"><label className="fl">Age</label><input type="number" className="fc" value={ef.age} onChange={e=>setEf(x=>({...x,age:e.target.value}))}/></div>
                <div className="fg"><label className="fl">Max lessons/wk</label><input type="number" className="fc" value={ef.maxWeekly} onChange={e=>setEf(x=>({...x,maxWeekly:e.target.value}))}/></div>
              </div>
              <div className="fg"><label className="fl">Microchip Number</label><input className="fc" placeholder="e.g. IL-0042871" value={ef.chipNumber} onChange={e=>setEf(x=>({...x,chipNumber:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Housing</label>
                <select className="fc" value={ef.housing} onChange={e=>setEf(x=>({...x,housing:e.target.value}))}>
                  <option value="stall">In Stall 🏠</option>
                  <option value="pasture">In Pasture 🌿</option>
                  <option value="hybrid">Hybrid 🔄</option>
                </select>
              </div>
              <div className="fg"><label className="fl">Type</label>
                <select className="fc" value={ef.type} onChange={e=>setEf(x=>({...x,type:e.target.value}))}>
                  <option value="in-house">In-House</option><option value="client">Client-Owned</option>
                </select>
              </div>
              {ef.type==="client"&&(
                <div className="fg"><label className="fl">Owner</label>
                  <select className="fc" value={ef.ownerId} onChange={e=>setEf(x=>({...x,ownerId:e.target.value}))}>
                    <option value="">None</option>
                    {(data.contacts||[]).filter(c=>c.status==="active").map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
              )}
              <div className="fg">
                <label className="fl">Suited For</label>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  {["Sport","Therapeutic"].map(s=>{
                    const on=ef.suitedFor.includes(s);
                    return <button key={s} className={"chip"+(on?" on":"")} onClick={()=>setEf(x=>({...x,suitedFor:on?x.suitedFor.filter(i=>i!==s):[...x.suitedFor,s]}))}>{s}</button>;
                  })}
                </div>
              </div>
              <div className="fg"><label className="fl">Notes</label><textarea className="fc" rows={3} value={ef.notes} onChange={e=>setEf(x=>({...x,notes:e.target.value}))}/></div>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button className="btn btn-outline" style={{flex:1}} onClick={()=>setSec("overview")}>Cancel</button>
                <button className="btn btn-primary" style={{flex:1}} onClick={saveEdit}>Save Changes</button>
              </div>
            </div>
          )}
        </>
      );
    }



    if (type==="eventDetail") {
      return (
