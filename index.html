  /* ============================================================================
     REPORTS & EXPORT
  ============================================================================ */
  function Reports() {
    const [section, setSection] = useState("activity");
    const [range,    setRange]    = useState("month");
    const [customFrom, setFrom]   = useState(TODAY);
    const [customTo,   setTo]     = useState(TODAY);
    const [filterHorse, setFilterHorse] = useState("all");
    const [filterRider, setFilterRider] = useState("all");
    const [filterService, setFilterService] = useState("all");
    const [exporting,  setExporting] = useState(false);
    const [exported,   setExported]  = useState(false);
    const [showIncForm, setShowIncForm] = useState(false);
    const [incF, setIncF] = useState({date:TODAY,location:"",contactIds:[],horseIds:[],witnesses:"",description:"",attachments:[]});
    const [plPeriod, setPlPeriod] = useState("month"); // "month" | "year"
    const [plOffset, setPlOffset] = useState(0); // 0 = current, +1 = next month/year, -1 = previous

    // P&L calculations
    const nowYear     = TODAY.slice(0,4);
    const nowMonth    = TODAY.slice(0,7);

    // Calculate the target period based on offset
    const getTargetDate = () => {
      const base = new Date(TODAY+"T12:00:00");
      if(plPeriod==="month") base.setMonth(base.getMonth()+plOffset);
      else base.setFullYear(base.getFullYear()+plOffset);
      return base;
    };
    const targetDate  = getTargetDate();
    const targetYear  = String(targetDate.getFullYear());
    const targetMonth = `${targetYear}-${String(targetDate.getMonth()+1).padStart(2,"0")}`;

    const plFrom      = plPeriod==="month" ? targetMonth+"-01" : targetYear+"-01-01";
    const plTo        = plPeriod==="month"
      ? new Date(targetDate.getFullYear(), targetDate.getMonth()+1, 0).toISOString().split("T")[0]
      : targetYear+"-12-31";
    const plLabel     = plPeriod==="month"
      ? targetDate.toLocaleDateString("en-US",{month:"long",year:"numeric"})
      : targetYear;

    const plInRange   = e => e.date && e.date>=plFrom && e.date<=plTo;

    const plConfirmed = (data.scheduleEvents||[])
      .filter(e=>e.status==="completed"&&e.serviceKey!=="vet-session"&&plInRange(e))
      .reduce((s,e)=>s+(e.price||0),0)
      + (data.competitions||[]).filter(e=>e.status==="completed"&&plInRange(e)).reduce((s,e)=>s+(e.fee||0)*(e.contactIds||[]).length,0)
      + (data.clinics||[]).filter(e=>e.status==="completed"&&plInRange(e)).reduce((s,e)=>s+(e.price||0)*(e.contactIds||[]).length,0);

    const plPlanned   = (data.scheduleEvents||[])
      .filter(e=>e.status==="scheduled"&&e.serviceKey!=="vet-session"&&plInRange(e))
      .reduce((s,e)=>s+(e.price||0),0)
      + (data.competitions||[]).filter(e=>e.status!=="completed"&&e.status!=="cancelled"&&plInRange(e)).reduce((s,e)=>s+(e.fee||0)*(e.contactIds||[]).length,0)
      + (data.clinics||[]).filter(e=>e.status!=="completed"&&e.status!=="cancelled"&&plInRange(e)).reduce((s,e)=>s+(e.price||0)*(e.contactIds||[]).length,0);

    const plIncome    = plConfirmed + plPlanned;
    const plExpenses  = (data.expenses||[]).filter(e=>plInRange(e)).reduce((s,e)=>s+e.amount,0);
    const plProfit    = plIncome - plExpenses;

    const getRangeDates = () => {
      const now = new Date(TODAY+"T12:00:00");
      const iso = d => d.toISOString().split("T")[0];
      const startOf = u => { const d=new Date(now); if(u==="week"){d.setDate(d.getDate()-d.getDay());}if(u==="month"){d.setDate(1);}if(u==="year"){d.setMonth(0,1);} return iso(d); };
      if (range==="today")  return {from:TODAY,to:TODAY};
      if (range==="week")   return {from:startOf("week"),to:TODAY};
      if (range==="month")  return {from:startOf("month"),to:TODAY};
      if (range==="year")   return {from:startOf("year"),to:TODAY};
      if (range==="all")    return {from:"2000-01-01",to:"2099-12-31"};
      if (range==="custom") return {from:customFrom,to:customTo};
      return {from:TODAY,to:TODAY};
    };
    const {from,to} = getRangeDates();
    const inRange = e => e.date>=from && e.date<=to;

    const allEvents = (data.scheduleEvents||[]).filter(inRange);
    const completed = allEvents.filter(e=>e.status==="completed");
    const cancelled = allEvents.filter(e=>e.status==="cancelled");
    const revenue   = completed.reduce((s,e)=>s+(e.price||0),0);

    // Filtered for drill-downs
    const filtered = completed.filter(e=>{
      const byHorse   = filterHorse==="all"   || (e.horseIds||[]).includes(+filterHorse);
      const byRider   = filterRider==="all"   || (e.contactIds||[]).includes(+filterRider);
      const byService = filterService==="all" || e.serviceKey===filterService;
      return byHorse && byRider && byService;
    });

    const saveIncident = () => {}; // handled by IncidentForm
    const toggleInc = () => {};

    const exportXLSX = async () => {
      setExporting(true);
      try {
        const wb = XLSX.utils.book_new();

        // Sessions sheet
        const sessionRows = filtered.map(e=>{
          const names  = (e.contactIds||[]).map(id=>(data.contacts||[]).find(c=>c.id===id)?.name).filter(Boolean).join(", ");
          const horses = (e.horseIds||[]).map(id=>(data.horses||[]).find(h=>h.id===id)?.name).filter(Boolean).join(", ");
          return {Date:e.date,Time:e.time,"Duration (min)":e.duration||0,Contacts:names,Horses:horses,
            "Event Type":e.eventType||"","Service":SERVICE_TYPES.find(s=>s.key===e.serviceKey)?.label||"",
            Instructor:e.instructor||"",Fee:e.price||0,Status:e.status,"Notes":e.sessionNotes||""};
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sessionRows), "Sessions");

        // Per-rider
        const riders = (data.contacts||[]).filter(c=>c.roles?.includes("Rider"));
        const riderRows = riders.map(c=>{
          const evts = filtered.filter(e=>e.contactIds?.includes(c.id));
          return {Rider:c.name,Sessions:evts.length,Revenue:evts.reduce((s,e)=>s+(e.price||0),0)};
        }).filter(r=>r.Sessions>0);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(riderRows), "By Rider");

        // Per-horse
        const horseRows = (data.horses||[]).map(h=>{
          const evts = filtered.filter(e=>(e.horseIds||[]).includes(h.id));
          return {Horse:h.name,Sessions:evts.length,Revenue:evts.reduce((s,e)=>s+(e.price||0),0)};
        }).filter(r=>r.Sessions>0);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(horseRows), "By Horse");

        // Per-activity
        const actRows = SERVICE_TYPES.map(s=>{
          const evts = filtered.filter(e=>e.serviceKey===s.key);
          return {"Service":s.label,Sessions:evts.length,Revenue:evts.reduce((s2,e)=>s2+(e.price||0),0)};
        }).filter(r=>r.Sessions>0);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(actRows), "By Activity");

        // Incidents — always included
        const incRows = (data.incidentReports||[]).map(r=>{
          const names  = (r.contactIds||[]).map(id=>(data.contacts||[]).find(c=>c.id===id)?.name).filter(Boolean).join(", ");
          const horses = (r.horseIds||[]).map(id=>(data.horses||[]).find(h=>h.id===id)?.name).filter(Boolean).join(", ");
          const files  = (r.attachments||[]).map(a=>a.name).join(", ");
          return {Date:r.date,Location:r.location,"People Involved":names,"Horses Involved":horses,Witnesses:r.witnesses,Description:r.description,"Attached Files":files};
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(incRows.length?incRows:[{Note:"No incidents recorded"}]), "Incidents");

        const label = range==="custom"?`${from}_to_${to}`:range;
        XLSX.writeFile(wb, `SheerTalent_Report_${label}.xlsx`);
        setExported(true); setTimeout(()=>setExported(false),3000);
      } catch(e){console.error(e);}
      setExporting(false);
    };

    const RANGES = [["today","Today"],["week","Week"],["month","Month"],["year","Year"],["all","All Time"],["custom","Custom"]];
    const riders  = (data.contacts||[]).filter(c=>c.roles?.includes("Rider")&&c.status==="active");

    return (
      <div>
        <div className="sec-hdr"><div className="sec-title">Reports</div></div>

        {/* ── P&L Summary ── */}
        <div style={{borderRadius:12,background:T.navy,padding:"16px",marginBottom:14,color:"#EBF2FA"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setPlOffset(x=>x-1)} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:6,width:28,height:28,color:"#EBF2FA",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
              <div style={{fontSize:12,fontWeight:600,color:"#EBF2FA",minWidth:130,textAlign:"center"}}>{plLabel}</div>
              <button onClick={()=>setPlOffset(x=>x+1)} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:6,width:28,height:28,color:"#EBF2FA",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
            </div>
            <div style={{display:"flex",background:"rgba(255,255,255,0.08)",borderRadius:6,overflow:"hidden"}}>
              {[["month","Month"],["year","Year"]].map(([v,l])=>(
                <button key={v} onClick={()=>{setPlPeriod(v);setPlOffset(0);}} style={{padding:"4px 14px",fontSize:11,fontWeight:600,border:"none",cursor:"pointer",background:plPeriod===v?"#fff":"transparent",color:plPeriod===v?T.navy:"#9096B8",transition:"all .15s"}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
            <div style={{background:"rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#9096B8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Income</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:"#6EE7B7"}}>{fmt(plIncome)}</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 8px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#9096B8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Expenses</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:"#F87171"}}>{fmt(plExpenses)}</div>
            </div>
            <div style={{background:plProfit>=0?"rgba(110,231,183,0.12)":"rgba(248,113,113,0.12)",borderRadius:8,padding:"10px 8px",textAlign:"center",border:`1px solid ${plProfit>=0?"rgba(110,231,183,0.3)":"rgba(248,113,113,0.3)"}`}}>
              <div style={{fontSize:10,color:"#9096B8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Profit</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:plProfit>=0?"#6EE7B7":"#F87171"}}>{plProfit>=0?"+":""}{fmt(plProfit)}</div>
            </div>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10,display:"flex",justifyContent:"space-between"}}>
            <div style={{fontSize:11,color:"#9096B8"}}>✓ Confirmed <span style={{color:"#6EE7B7",fontWeight:600}}>{fmt(plConfirmed)}</span></div>
            <div style={{fontSize:11,color:"#9096B8"}}>📅 Planned <span style={{color:"#93C5FD",fontWeight:600}}>{fmt(plPlanned)}</span></div>
          </div>
        </div>

        {/* Section tabs */}
        <div className="chips" style={{marginBottom:14}}>
          {[["activity","By Activity"],["horse","By Horse"],["rider","By Rider"],["incidents","Incidents"]].map(([v,l])=>(
            <button key={v} className={`chip${section===v?" on":""}`} onClick={()=>setSection(v)}>{l}</button>
          ))}
        </div>

        {/* ── INCIDENTS ── */}
        {section==="incidents"&&(
          <div>
            <button className="btn btn-primary btn-block" style={{marginBottom:14}} onClick={()=>setShowIncForm(x=>!x)}>
              {showIncForm?"Cancel":"+ File Incident Report"}
            </button>
            {showIncForm&&<IncidentForm data={data} upd={upd} onSave={()=>setShowIncForm(false)}/>}
            {(data.incidentReports||[]).length===0&&!showIncForm&&<div className="empty"><div className="empty-ico">📋</div><div className="empty-txt">No incident reports filed.</div></div>}
            {[...(data.incidentReports||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
              <IncidentCard key={r.id} r={r} data={data} upd={upd} setModal={setModal}/>
            ))}
            {(data.incidentReports||[]).length>0&&(
              <div style={{marginTop:16}}>
                <button className="btn btn-primary btn-block" onClick={exportXLSX} disabled={exporting} style={{fontSize:14,padding:"13px"}}>
                  {exporting?"Preparing...":exported?"✓ Downloaded!":"⬇ Export Incidents to Excel"}
                </button>
                <div style={{fontSize:11,color:T.slateLight,textAlign:"center",marginTop:6}}>
                  Exports all {(data.incidentReports||[]).length} incident report{(data.incidentReports||[]).length!==1?"s":""} including people, horses, witnesses & description
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── ACTIVITY / HORSE / RIDER reports ── */}
        {section!=="incidents"&&(
          <div>
            {/* Date range */}
            <div className="chips" style={{marginBottom:10}}>
              {RANGES.map(([v,l])=><button key={v} className={`chip${range===v?" on":""}`} onClick={()=>setRange(v)}>{l}</button>)}
            </div>
            {range==="custom"&&(
              <div className="grid2" style={{marginBottom:12}}>
                <div className="fg"><label className="fl">From</label><input type="date" className="fc" value={customFrom} onChange={e=>setFrom(e.target.value)}/></div>
                <div className="fg"><label className="fl">To</label><input type="date" className="fc" value={customTo} onChange={e=>setTo(e.target.value)}/></div>
              </div>
            )}

            {/* Drill-down filters */}
            {section==="horse"&&(
              <div className="fg"><label className="fl">Filter by Horse</label>
                <select className="fc" value={filterHorse} onChange={e=>setFilterHorse(e.target.value)}>
                  <option value="all">All Horses</option>
                  {(data.horses||[]).map(h=><option key={h.id} value={h.id}>{h.name}</option>)}
                </select>
              </div>
            )}
            {section==="rider"&&(
              <div className="fg"><label className="fl">Filter by Rider</label>
                <select className="fc" value={filterRider} onChange={e=>setFilterRider(e.target.value)}>
                  <option value="all">All Riders</option>
                  {riders.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
            )}
            {section==="activity"&&(
              <div className="fg"><label className="fl">Filter by Service</label>
                <select className="fc" value={filterService} onChange={e=>setFilterService(e.target.value)}>
                  <option value="all">All Services</option>
                  {SERVICE_TYPES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
              </div>
            )}

            {/* Revenue hero */}
            <div className="bill-hero" style={{flexDirection:"column",alignItems:"flex-start",gap:4,marginBottom:14}}>
              <div className="bill-hero-label">Revenue</div>
              <div className="bill-hero-amount">{fmt(filtered.reduce((s,e)=>s+(e.price||0),0))}</div>
              <div style={{fontSize:12,color:"#9096B8"}}>{filtered.length} completed session{filtered.length!==1?"s":""} · {cancelled.length} cancelled</div>
            </div>

            {/* Breakdown */}
            {section==="activity"&&(
              SERVICE_TYPES.map(s=>{
                const evts=filtered.filter(e=>e.serviceKey===s.key);
                if(!evts.length) return null;
                return (
                  <div key={s.key} className="card" style={{cursor:"default"}}>
                    <div className="card-top" style={{marginBottom:4}}>
                      <div className="card-name" style={{fontSize:14}}>{s.label}</div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(evts.reduce((s2,e)=>s2+(e.price||0),0))}</div>
                    </div>
                    <div className="row"><span className="row-label">Sessions</span><span className="row-value">{evts.length}</span></div>
                  </div>
                );
              })
            )}


            {section==="horse"&&(
              (data.horses||[]).map(h=>{
                const evts=filtered.filter(e=>(e.horseIds||[]).includes(h.id));
                if(!evts.length) return null;
                return (
                  <div key={h.id} className="card" style={{cursor:"default"}}>
                    <div className="card-top" style={{marginBottom:4}}>
                      <div><div className="card-name" style={{fontSize:14}}>{h.name}</div><div className="card-sub">{h.breed} · {h.color}</div></div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(evts.reduce((s,e)=>s+(e.price||0),0))}</div>
                    </div>
                    <div className="row"><span className="row-label">Sessions</span><span className="row-value">{evts.length}</span></div>
                  </div>
                );
              })
            )}

            {section==="rider"&&(
              riders.map(c=>{
                const dot=c.color||T.blue;
                const evts=filtered.filter(e=>e.contactIds?.includes(c.id));
                if(!evts.length) return null;
                return (
                  <div key={c.id} className="card" style={{cursor:"pointer",borderLeft:`4px solid ${dot}`}} onClick={()=>setModal({type:"contactDetail",payload:c})}>
                    <div className="card-top" style={{marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:dot}}/>
                        <div className="card-name" style={{fontSize:14}}>{c.name}</div>
                      </div>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(evts.reduce((s,e)=>s+(e.price||0),0))}</div>
                    </div>
                    <div className="row"><span className="row-label">Sessions</span><span className="row-value">{evts.length}</span></div>
                    <div style={{fontSize:11,color:T.slateLight,marginTop:4}}>Tap for full profile</div>
                  </div>
                );
              })
            )}

            {filtered.length===0&&<div className="empty"><div className="empty-ico">📊</div><div className="empty-txt">No sessions match these filters.</div></div>}

            {/* Export */}
            <div style={{marginTop:20}}>
              <button className="btn btn-primary btn-block" onClick={exportXLSX} disabled={exporting} style={{fontSize:14,padding:"13px"}}>
                {exporting?"Preparing...":exported?"✓ Downloaded!":"⬇ Export to Excel (.xlsx)"}
              </button>
              <div style={{fontSize:11,color:T.slateLight,textAlign:"center",marginTop:8}}>
                Exports: Sessions · By Rider · By Horse · By Activity · Incidents
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  function GCal() {
    const [connected,  setConnected]  = useState(false);
    const [notifTime,  setNotifTime]  = useState("07:00");
    const [notifSaved, setNotifSaved] = useState(false);
    const [syncing,    setSyncing]    = useState(false);
    const [syncDone,   setSyncDone]   = useState(false);

    // -- Build a Google Calendar "Add event" URL for a schedule event --
    const gcalUrl = (l) => {
      const names = (l.contactIds||[]).map(id=>data.contacts?.find(c=>c.id===id)?.name).filter(Boolean).join(", ");
      const horses= (l.horseIds||[]).map(id=>data.horses?.find(h=>h.id===id)?.name).filter(Boolean).join(", ");
      const [y,mo,d] = l.date.split("-").map(Number);
      const [hh,mm]  = l.time.split(":").map(Number);
      const start = new Date(y,mo-1,d,hh,mm);
      const end   = new Date(start.getTime()+(l.duration||60)*60000);
      const pad   = n=>String(n).padStart(2,"0");
      const fmtGcal = dt =>
        `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
      const title   = encodeURIComponent(`🐴 ${names} -- ${l.eventType}`);
      const details = encodeURIComponent(`Horses: ${horses||"--"}\nInstructor: ${l.instructor||"--"}\nFee: ₪${l.price||0}\nService: ${l.serviceKey||""}`);
      const loc = encodeURIComponent(l.isExternal?l.externalLocation||"External":"Sheer Talent Stables");
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmtGcal(start)}/${fmtGcal(end)}&details=${details}&location=${loc}`;
    };

    // -- Daily reminder Google Calendar URL --
    const reminderUrl = () => {
      const [hh,mm] = notifTime.split(":");
      const now = new Date(TODAY+"T12:00:00");
      const pad = n=>String(n).padStart(2,"0");
      const startStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}T${hh}${mm}00`;
      const endH = String(parseInt(hh)+(mm==="30"?0:0)).padStart(2,"0");
      const endM = pad((parseInt(mm)+15)%60);
      const endStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}T${hh}${endM}00`;
      const title = encodeURIComponent("✅ Sheer Talent -- Confirm Today's Lessons");
      const details = encodeURIComponent("Open your Sheer Talent app and mark each lesson as Completed or Cancelled.");
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startStr}/${endStr}&details=${details}&recur=RRULE:FREQ%3DDAILY`;
    };

    const todayLessons = (data.scheduleEvents||[]).filter(e=>e.date===TODAY&&e.status==="scheduled");

    return (
      <div>
        <div className="sec-hdr"><div className="sec-title">Google Calendar</div></div>

        {/* Connection status */}
        <div className="card" style={{cursor:"default",borderColor:connected?T.green:T.border}}>
          <div className="card-top">
            <div>
              <div className="card-name">Google Calendar</div>
              <div className="card-sub">{connected?"Connected -- lessons sync automatically":"Not connected yet"}</div>
            </div>
            <span className={`badge badge-${connected?"green":"slate"}`}>{connected?"Connected":"Disconnected"}</span>
          </div>
          {!connected ? (
            <>
              <div className="alert alert-blue" style={{fontSize:12,marginTop:4}}>
                Tap below to open Google Calendar in your browser. Sign in with your Google account and authorize Sheer Talent to add events.
              </div>
              <button className="btn btn-primary btn-block" style={{marginTop:4}} onClick={()=>setConnected(true)}>
                Connect Google Account
              </button>
            </>
          ) : (
            <button className="btn btn-outline btn-block" style={{marginTop:4,fontSize:12}} onClick={()=>setConnected(false)}>
              Disconnect
            </button>
          )}
        </div>

        {/* Add today's lessons to Google Calendar */}
        <div className="sec-hdr" style={{marginTop:8}}><div className="sec-title" style={{fontSize:16}}>Add Lessons to Calendar</div></div>

        {todayLessons.length===0 && (
          <div className="alert alert-blue">No lessons scheduled for today.</div>
        )}

        {todayLessons.map(l=>{
          const names  = (l.contactIds||[]).map(id=>data.contacts?.find(c=>c.id===id)?.name?.split(" ")[0]).filter(Boolean).join(", ");
          const horses = (l.horseIds||[]).map(id=>data.horses?.find(h=>h.id===id)?.name).filter(Boolean).join(", ");
          const color  = l.contactIds?.length===1 ? (data.contacts?.find(c=>c.id===l.contactIds[0])?.color||T.blue) : T.blue;
          return (
            <div key={l.id} className="card" style={{borderLeft:`4px solid ${color}`}}>
              <div className="card-top">
                <div>
                  <div className="card-name">{l.time} · {names||"--"}</div>
                  <div className="card-sub">{l.eventType} · {l.duration} min{horses?` · ${horses}`:""}</div>
                </div>
                <span className="badge" style={{background:`${color}22`,color}}>{l.eventType}</span>
              </div>
              <a
                href={gcalUrl(l)}
                target="_blank"
                rel="noopener noreferrer"
                style={{textDecoration:"none"}}
              >

                    <div style={{fontSize:11,color:T.slateLight}}>{l.eventType}</div>
                  </div>
                  <button onClick={()=>{upd("scheduleEvents",(data.scheduleEvents||[]).map(e=>e.id===l.id?{...e,status:"completed"}:e));}} style={{background:T.greenBg,color:T.green,border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Done</button>
                  <button onClick={()=>{upd("scheduleEvents",(data.scheduleEvents||[]).map(e=>e.id===l.id?{...e,status:"cancelled",cancellationReason:"Cancelled on the day"}:e));}} style={{background:T.redBg,color:T.red,border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                </div>
              );

            {todayLessons.length>1&&(
              <button className="btn btn-primary btn-block" style={{marginBottom:14}} onClick={()=>upd("scheduleEvents",(data.scheduleEvents||[]).map(e=>e.date===TODAY&&e.status==="scheduled"?{...e,status:"completed"}:e))}>
                Mark All Today as Completed
              </button>

          </>
        )}

        {/* --- Daily Gmail Reminder --- */}
        <div className="sec-hdr" style={{marginTop:8}}><div className="sec-title" style={{fontSize:16}}>Daily Email Reminder</div></div>
        <div className="card" style={{cursor:"default"}}>
          <div className="card-name" style={{marginBottom:6}}>Send Daily Reminder Email</div>
          <div className="card-sub" style={{marginBottom:14}}>
            Creates a mailto link that opens Gmail with a pre-filled daily reminder to confirm lesson statuses.
          </div>
          <div className="fg">
            <label className="fl">Reminder Time (for calendar reference)</label>
            <input type="time" className="fc" value={notifTime} onChange={e=>setNotifTime(e.target.value)}/>

          <a href={`mailto:?subject=${encodeURIComponent("Sheer Talent - Confirm Today's Lessons")}&body=${encodeURIComponent("Hi,\n\nPlease open the Sheer Talent app and confirm the status of all lessons from today.\n\nSessions to confirm:\n"+todayLessons.map(l=>"- "+(l.contactIds||[]).map(id=>data.contacts?.find(c=>c.id===id)?.name).filter(Boolean).join(", ")+" at "+l.time).join("\n")+"\n\nTap each lesson to mark it as Completed or Cancelled.\n")}`} style={{textDecoration:"none"}}>
            <button className="btn btn-primary btn-block" style={{marginBottom:8}}>
              📧 Open in Gmail / Mail App
            </button>

          <a href={reminderUrl()} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>

            Google Calendar reminder repeats daily. Email opens your mail app pre-filled.

            <div>① Tap any session's "Add to Google Calendar" button</div>

  /* -- Income & Rate Cards -------------------------------------------------- */
  function Income() {
    const [rateEdit, setRateEdit] = useState(false);
    const [rates, setRates] = useState({...(data.serviceRates||{})});
    const [expandedSvc, setExpandedSvc] = useState(null);
    const [expandedMonth, setExpandedMonth] = useState(null);
    const [expandedComp, setExpandedComp] = useState(false);
    const [expandedClin, setExpandedClin] = useState(false);
    const saveRates = () => { upd("serviceRates", rates); setRateEdit(false); };

    const now = new Date(TODAY+"T12:00:00");
    const months = Array.from({length:6},(_,i)=>{
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      return { key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`,
               label: d.toLocaleDateString("en-US",{month:"short",year:"numeric"}) };
    });
    const nowMonthKey = months[0].key;

    const eventsInMonth = (mk) =>
      (data.scheduleEvents||[]).filter(e=>e.status==="completed"&&e.serviceKey!=="vet-session"&&e.date.startsWith(mk));

    const compFeesInMonth = (mk) =>
      (data.competitions||[]).filter(e=>e.date&&e.date.startsWith(mk)&&e.status==="completed")
        .reduce((s,e)=>s+(e.fee||0)*(e.contactIds||[]).length,0);

    const clinicFeesInMonth = (mk) =>
      (data.clinics||[]).filter(e=>e.date&&e.date.startsWith(mk)&&e.status==="completed")
        .reduce((s,e)=>s+(e.price||0)*(e.contactIds||[]).length,0);

    const monthlyRevenue = months.map(m=>({
      ...m,
      events: eventsInMonth(m.key),
      compFees: compFeesInMonth(m.key),
      clinicFees: clinicFeesInMonth(m.key),
      total: eventsInMonth(m.key).reduce((s,e)=>s+(e.price||0),0) + compFeesInMonth(m.key) + clinicFeesInMonth(m.key),
    }));

    const currentMonth = monthlyRevenue[0];
    const prevMonth    = monthlyRevenue[1];
    const trend = prevMonth.total>0 ? Math.round(((currentMonth.total-prevMonth.total)/prevMonth.total)*100) : null;

    // Planned forecast: scheduled sessions + scheduled comps/clinics this month
    const plannedSessions = (data.scheduleEvents||[]).filter(e=>e.status==="scheduled"&&e.serviceKey!=="vet-session"&&e.date.startsWith(nowMonthKey));
    const plannedComps    = (data.competitions||[]).filter(e=>e.date&&e.date.startsWith(nowMonthKey)&&e.status!=="completed"&&e.status!=="cancelled");
    const plannedClinics  = (data.clinics||[]).filter(e=>e.date&&e.date.startsWith(nowMonthKey)&&e.status!=="completed"&&e.status!=="cancelled");
    const plannedTotal    = plannedSessions.reduce((s,e)=>s+(e.price||0),0)
                          + plannedComps.reduce((s,e)=>s+(e.fee||0)*(e.contactIds||[]).length,0)
                          + plannedClinics.reduce((s,e)=>s+(e.price||0)*(e.contactIds||[]).length,0);
    const forecastTotal   = currentMonth.total + plannedTotal;

    const byService = SERVICE_TYPES.map(svc=>{
      const evts = currentMonth.events.filter(e=>e.serviceKey===svc.key);
      return {...svc, count:evts.length, revenue:evts.reduce((s,e)=>s+(e.price||0),0), evts};
    }).filter(s=>s.count>0).sort((a,b)=>b.revenue-a.revenue);

    const getContactNames = (e) => (e.contactIds||[]).map(id=>(data.contacts||[]).find(c=>c.id===id)?.name).filter(Boolean).join(", ");
    const getHorseNames   = (e) => (e.horseIds||[]).map(id=>(data.horses||[]).find(h=>h.id===id)?.name).filter(Boolean).join(", ");

    // Comp/clinic details for current month
    const thisMonthComps   = (data.competitions||[]).filter(e=>e.date&&e.date.startsWith(nowMonthKey));
    const thisMonthClinics = (data.clinics||[]).filter(e=>e.date&&e.date.startsWith(nowMonthKey));

    return (
      <div>
        <div className="sec-hdr"><div className="sec-title">Income</div></div>

        {/* Current month hero */}
        <div className="bill-hero" style={{flexDirection:"column",alignItems:"flex-start",gap:4,marginBottom:8}}>
          <div className="bill-hero-label">{currentMonth.label} Confirmed Revenue</div>
          <div className="bill-hero-amount">{fmt(currentMonth.total)}</div>
          {trend!==null&&<div style={{fontSize:12,color:trend>=0?"#6EE7B7":"#F87171"}}>
            {trend>=0?"↑":"↓"} {Math.abs(trend)}% vs {prevMonth.label}
          </div>}
          <div style={{fontSize:12,color:"#9096B8",marginTop:2}}>{currentMonth.events.length} completed sessions{currentMonth.compFees>0?` · ${fmt(currentMonth.compFees)} comp`:""}{currentMonth.clinicFees>0?` · ${fmt(currentMonth.clinicFees)} clinic`:""}</div>
        </div>

        {/* Planned forecast */}
        {plannedTotal>0&&(
          <div style={{borderRadius:10,border:`1px solid ${T.blue}33`,background:T.skyTint,padding:"12px 14px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:11,color:T.blue,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:2}}>📅 Month Forecast</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:700,color:T.blue}}>{fmt(forecastTotal)}</div>
                <div style={{fontSize:11,color:T.slateLight,marginTop:2}}>Confirmed {fmt(currentMonth.total)} + Planned {fmt(plannedTotal)}</div>
              </div>
            </div>
            <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
              {plannedSessions.length>0&&<div style={{fontSize:12,color:T.slate}}>📋 {plannedSessions.length} upcoming session{plannedSessions.length!==1?"s":""} — {fmt(plannedSessions.reduce((s,e)=>s+(e.price||0),0))}</div>}
              {plannedComps.length>0&&<div style={{fontSize:12,color:T.slate}}>🏆 {plannedComps.length} competition{plannedComps.length!==1?"s":""} — {fmt(plannedComps.reduce((s,e)=>s+(e.fee||0)*(e.contactIds||[]).length,0))}</div>}
              {plannedClinics.length>0&&<div style={{fontSize:12,color:T.slate}}>🎓 {plannedClinics.length} clinic{plannedClinics.length!==1?"s":""} — {fmt(plannedClinics.reduce((s,e)=>s+(e.price||0)*(e.contactIds||[]).length,0))}</div>}
            </div>
          </div>
        )}

        {/* By service this month */}
        {byService.length>0&&(<>
          <div className="sub-head" style={{marginBottom:10}}>This Month by Service</div>
          {byService.map(s=>{
            const open = expandedSvc===s.key;
            return (
              <div key={s.key} style={{marginBottom:8}}>
                <div className="card" style={{cursor:"pointer",marginBottom:0}} onClick={()=>setExpandedSvc(open?null:s.key)}>
                  <div className="card-top" style={{marginBottom:4}}>
                    <div><div className="card-name" style={{fontSize:14}}>{s.label}</div></div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(s.revenue)}</div>
                      <span style={{fontSize:14,color:T.slateLight}}>{open?"▲":"▼"}</span>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:16}}>
                    <div className="row" style={{margin:0}}><span className="row-label">Sessions</span><span className="row-value" style={{marginLeft:6}}>{s.count}</span></div>
                    <div className="row" style={{margin:0}}><span className="row-label">Avg</span><span className="row-value" style={{marginLeft:6}}>{fmt(Math.round(s.revenue/s.count))}</span></div>
                  </div>
                </div>
                {open&&(
                  <div style={{border:`1px solid ${T.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:T.offWhite,padding:"8px 12px"}}>
                    {s.evts.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>(
                      <div key={e.id} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}} onClick={()=>setModal({type:"scheduleDetail",payload:e})}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{fmtD(e.date)} · {e.time}</div>
                            <div style={{fontSize:11,color:T.slateLight}}>{getContactNames(e)||"--"}{getHorseNames(e)?` · ${getHorseNames(e)}`:""}</div>
                          </div>
                          <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:T.blue,fontWeight:600}}>{fmt(e.price||0)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </>)}

        {/* Competitions this month */}
        {thisMonthComps.length>0&&(<>
          <div className="div"/>
          <div className="card" style={{cursor:"pointer",marginBottom:0}} onClick={()=>setExpandedComp(x=>!x)}>
            <div className="card-top" style={{marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🏆</span>
                <div className="card-name" style={{fontSize:14}}>Competitions</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(currentMonth.compFees)}</div>
                <span style={{fontSize:14,color:T.slateLight}}>{expandedComp?"▲":"▼"}</span>
              </div>
            </div>
            <div style={{fontSize:12,color:T.slateLight}}>{thisMonthComps.filter(e=>e.status==="completed").length}/{thisMonthComps.length} confirmed</div>
          </div>
          {expandedComp&&(
            <div style={{border:`1px solid ${T.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:T.offWhite,padding:"8px 12px",marginBottom:8}}>
              {thisMonthComps.map(e=>{
                const riders=(e.contactIds||[]).map(id=>(data.contacts||[]).find(c=>c.id===id)?.name).filter(Boolean);
                const fee=(e.fee||0)*(e.contactIds||[]).length;
                return (
                  <div key={e.id} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}} onClick={()=>setModal({type:"eventDetail",payload:{...e,kind:"competition"}})}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{e.name}</div>
                        <div style={{fontSize:11,color:T.slateLight}}>{fmtD(e.date)} · {riders.length} rider{riders.length!==1?"s":""}</div>
                        {riders.length>0&&<div style={{fontSize:11,color:T.slateLight}}>{riders.join(", ")}</div>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:e.status==="completed"?T.blue:T.slateLight,fontWeight:600}}>{fmt(fee)}</div>
                        <span className={`badge badge-${e.status==="completed"?"green":e.status==="cancelled"?"red":"blue"}`} style={{fontSize:10}}>{e.status||"scheduled"}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>)}

        {/* Clinics this month */}
        {thisMonthClinics.length>0&&(<>
          {thisMonthComps.length===0&&<div className="div"/>}
          <div className="card" style={{cursor:"pointer",marginBottom:0}} onClick={()=>setExpandedClin(x=>!x)}>
            <div className="card-top" style={{marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🎓</span>
                <div className="card-name" style={{fontSize:14}}>Clinics</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(currentMonth.clinicFees)}</div>
                <span style={{fontSize:14,color:T.slateLight}}>{expandedClin?"▲":"▼"}</span>
              </div>
            </div>
            <div style={{fontSize:12,color:T.slateLight}}>{thisMonthClinics.filter(e=>e.status==="completed").length}/{thisMonthClinics.length} confirmed</div>
          </div>
          {expandedClin&&(
            <div style={{border:`1px solid ${T.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:T.offWhite,padding:"8px 12px",marginBottom:8}}>
              {thisMonthClinics.map(e=>{
                const riders=(e.contactIds||[]).map(id=>(data.contacts||[]).find(c=>c.id===id)?.name).filter(Boolean);
                const fee=(e.price||0)*(e.contactIds||[]).length;
                return (
                  <div key={e.id} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}} onClick={()=>setModal({type:"eventDetail",payload:{...e,kind:"clinic"}})}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{e.name}</div>
                        <div style={{fontSize:11,color:T.slateLight}}>{fmtD(e.date)} · {e.clinician?`${e.clinician} · `:""}  {riders.length} rider{riders.length!==1?"s":""}</div>
                        {riders.length>0&&<div style={{fontSize:11,color:T.slateLight}}>{riders.join(", ")}</div>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:e.status==="completed"?T.blue:T.slateLight,fontWeight:600}}>{fmt(fee)}</div>
                        <span className={`badge badge-${e.status==="completed"?"green":e.status==="cancelled"?"red":"blue"}`} style={{fontSize:10}}>{e.status||"scheduled"}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>)}

        {byService.length===0&&thisMonthComps.length===0&&thisMonthClinics.length===0&&<div className="alert alert-blue">No income recorded this month yet.</div>}

        {/* Monthly history */}
        <div className="div"/>
        <div className="sub-head" style={{marginBottom:10}}>Monthly History</div>
        {monthlyRevenue.map(m=>{
          const open = expandedMonth===m.key;
          const mByService = SERVICE_TYPES.map(svc=>{
            const evts = m.events.filter(e=>e.serviceKey===svc.key);
            return {...svc, count:evts.length, revenue:evts.reduce((s,e)=>s+(e.price||0),0), evts};
          }).filter(s=>s.count>0).sort((a,b)=>b.revenue-a.revenue);
          return (
            <div key={m.key} style={{marginBottom:8}}>
              <div className="card" style={{cursor:"pointer",marginBottom:0}} onClick={()=>setExpandedMonth(open?null:m.key)}>
                <div className="card-top" style={{marginBottom:4}}>
                  <div className="card-name" style={{fontSize:14}}>{m.label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(m.total)}</div>
                    <span style={{fontSize:14,color:T.slateLight}}>{open?"▲":"▼"}</span>
                  </div>
                </div>
                <div className="row" style={{margin:0}}><span className="row-label">Sessions completed</span><span className="row-value" style={{marginLeft:6}}>{m.events.length}</span></div>
              </div>
              {open&&(
                <div style={{border:`1px solid ${T.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",background:T.offWhite,padding:"8px 12px"}}>
                  {mByService.length===0&&<div style={{fontSize:12,color:T.slateLight,padding:"8px 0"}}>No completed sessions.</div>}

                    <div key={s.key} style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{s.label}</div>
                        <div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:T.blue,fontWeight:600}}>{fmt(s.revenue)}</div>
                      </div>
                      <div style={{fontSize:11,color:T.slateLight}}>{s.count} session{s.count!==1?"s":""} · avg {fmt(Math.round(s.revenue/s.count))}</div>

                  ))}
                  {m.compFees>0&&<div style={{padding:"8px 0",borderBottom:`1px solid ${T.border}`}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:13,fontWeight:600,color:T.navy}}>🏆 Competition Fees</div><div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:T.blue,fontWeight:600}}>{fmt(m.compFees)}</div></div></div>}
                  {m.clinicFees>0&&<div style={{padding:"8px 0"}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:13,fontWeight:600,color:T.navy}}>🎓 Clinic Fees</div><div style={{fontFamily:"'Cinzel',serif",fontSize:14,color:T.blue,fontWeight:600}}>{fmt(m.clinicFees)}</div></div></div>}
                </div>
              )}
            </div>
          );

                <div style={{fontSize:13,fontWeight:600,color:T.navy}}>{s.label}</div>
                {s.fixed&&<div style={{fontSize:11,color:T.slateLight}}>Fixed monthly rate</div>}
                {s.isExpense&&<div style={{fontSize:11,color:T.red}}>Expense — not billed to riders</div>}
              </div>
              {!s.isExpense&&(rateEdit ? (
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:13,color:T.slate}}>₪</span>
                  <input type="number" value={rates[s.key]||0}
                    onChange={e=>setRates(r=>({...r,[s.key]:+e.target.value}))}
                    style={{width:80,padding:"5px 8px",borderRadius:6,border:"1px solid "+T.border,fontSize:13,fontFamily:"'DM Sans',sans-serif"}}/>
                </div>
              ) : (
                <div style={{fontFamily:"'Cinzel',serif",fontSize:16,color:T.blue,fontWeight:600}}>{fmt(data.serviceRates?.[s.key]||s.defaultRate)}</div>
              ))}
            </div>
          </div>
        ))}
        {rateEdit&&<button className="btn btn-primary btn-block" style={{marginTop:8}} onClick={saveRates}>Save All Rates</button>}
      </div>
    );
  }

  const fabAction = () => {
    if (tab==="contacts") return setModal({type:"addContact"});
    if (tab==="events")   return setModal({type:"addEvent",payload:{kind:"competition"}});
    return setModal({type:"addScheduleEvent"});
  };
  const showFab = ["dashboard","schedule","contacts","events"].includes(tab);

  const renderTab = () => {
    if (tab==="dashboard") return <Dashboard/>;
    if (tab==="contacts")  return <Contacts/>;
    if (tab==="horses")    return <Horses/>;
    if (tab==="schedule")  return <Schedule/>;
    if (tab==="events")    return <Events/>;
    if (tab==="billing")   return <Billing/>;
    if (tab==="income")    return <Income/>;
    if (tab==="expenses")  return <Expenses/>;
    if (tab==="reports")   return <Reports/>;
    if (tab==="gcal")      return <GCal/>;
  };

    return <CloudSetup onConnect={handleCloudConnect}/>;

        <div style={{fontSize:13,color:T.slateLight}}>Loading shared data…</div>
      </div>
    );
  }
